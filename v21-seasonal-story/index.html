<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild America — Seasonal Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  --text: #1A1A1A;
  --text-muted: #555;
  --text-light: #888;
  --card-bg: #fff;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 18px rgba(0,0,0,0.11);
  --shadow-lg: 0 8px 36px rgba(0,0,0,0.16);
  --radius: 14px;
  --nav-h: 56px;
  --tabs-h: 52px;
  color: var(--text);
  transition: background-color 0.55s ease, color 0.3s ease;
}

/* ── Season Themes ─────────────────────────────────────── */
body.season-all {
  --bg: #F8FAFC; --bg-alt: #EEF2F7;
  --primary: #374151; --primary-dark: #1F2937; --primary-light: #4B5563;
  --accent: #6366F1; --accent-light: #818CF8;
  background: var(--bg);
}
body.season-spring {
  --bg: #F0FDF4; --bg-alt: #DCFCE7;
  --primary: #16A34A; --primary-dark: #15803D; --primary-light: #22C55E;
  --accent: #84CC16; --accent-light: #A3E635;
  background: var(--bg);
}
body.season-summer {
  --bg: #EFF6FF; --bg-alt: #DBEAFE;
  --primary: #1D4ED8; --primary-dark: #1E40AF; --primary-light: #3B82F6;
  --accent: #F59E0B; --accent-light: #FBBF24;
  background: var(--bg);
}
body.season-fall {
  --bg: #FFF7ED; --bg-alt: #FED7AA;
  --primary: #C2410C; --primary-dark: #9A3412; --primary-light: #EA580C;
  --accent: #D97706; --accent-light: #F59E0B;
  background: var(--bg);
}
body.season-winter {
  --bg: #F8FAFC; --bg-alt: #E2EAF4;
  --primary: #1E3A5F; --primary-dark: #162D4A; --primary-light: #2563A8;
  --accent: #60A5FA; --accent-light: #93C5FD;
  background: var(--bg);
}

/* ── Nav ───────────────────────────────────────────────── */
#nav {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex; align-items: center;
  padding: 0 1.5rem;
  transition: background 0.55s ease;
  backdrop-filter: blur(8px);
}
#nav h1 {
  font-family: 'Merriweather', serif;
  font-size: 1.2rem; font-weight: 700;
  color: var(--primary);
  transition: color 0.3s;
  flex: 1;
}
#trip-badge {
  background: var(--primary); color: #fff;
  font-size: 0.82rem; font-weight: 600;
  padding: 0.3rem 0.75rem; border-radius: 999px;
  cursor: pointer; transition: background 0.3s;
  white-space: nowrap;
}
#trip-badge:hover { background: var(--primary-dark); }

/* ── Season Tabs ───────────────────────────────────────── */
#season-tabs {
  position: sticky; top: var(--nav-h); z-index: 190;
  background: var(--bg);
  border-bottom: 1px solid rgba(0,0,0,0.07);
  display: flex; gap: 0.4rem;
  padding: 0.5rem 1.5rem;
  overflow-x: auto; scrollbar-width: none;
  transition: background 0.55s ease;
}
#season-tabs::-webkit-scrollbar { display: none; }
.season-tab {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.42rem 1rem; border-radius: 999px;
  border: 1.5px solid rgba(0,0,0,0.1);
  background: var(--bg-alt); color: var(--text-muted);
  font-size: 0.95rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.25s ease;
}
.season-tab:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.season-tab.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.tab-count {
  background: rgba(255,255,255,0.25); color: inherit;
  font-size: 0.72rem; font-weight: 700;
  padding: 0.1rem 0.4rem; border-radius: 999px;
}
.season-tab:not(.active) .tab-count { background: rgba(0,0,0,0.08); }

/* ── Main Layout ───────────────────────────────────────── */
#main { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* ── Swipe Deck ────────────────────────────────────────── */
#swipe-section {
  padding: 2rem 0 1.5rem;
}
#swipe-section h2 {
  font-family: 'Merriweather', serif;
  font-size: 1.4rem; font-weight: 700;
  color: var(--primary); margin-bottom: 1.25rem;
  transition: color 0.3s;
}
#swipe-arena {
  position: relative;
  height: 380px;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
#swipe-done {
  display: none; flex-direction: column; align-items: center;
  gap: 0.75rem; text-align: center;
  color: var(--text-muted); font-size: 1rem;
}
#swipe-done .done-icon { font-size: 2.5rem; }
#swipe-done p { font-size: 1rem; }
#swipe-done button {
  background: var(--primary); color: #fff;
  border: none; border-radius: 999px;
  padding: 0.6rem 1.5rem; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.swipe-card-wrapper {
  position: absolute;
  width: min(380px, 90vw);
  transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.35s;
}
.swipe-card-wrapper:nth-child(1) { z-index: 30; }
.swipe-card-wrapper:nth-child(2) { z-index: 20; transform: scale(0.96) translateY(12px); opacity: 0.75; pointer-events: none; }
.swipe-card-wrapper:nth-child(3) { z-index: 10; transform: scale(0.92) translateY(24px); opacity: 0.5; pointer-events: none; }
.swipe-card {
  background: var(--card-bg);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  cursor: grab;
  position: relative;
}
.swipe-card:active { cursor: grabbing; }
.swipe-card-img {
  width: 100%; aspect-ratio: 3/2;
  object-fit: cover; display: block;
  pointer-events: none;
}
.swipe-card-body { padding: 1rem 1.1rem 1.1rem; }
.swipe-card-title {
  font-family: 'Merriweather', serif;
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 0.25rem;
}
.swipe-card-meta { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 0.4rem; }
.swipe-card-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.swipe-overlay {
  position: absolute; inset: 0; border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 800; letter-spacing: 0.05em;
  opacity: 0; pointer-events: none; transition: opacity 0.1s;
}
.swipe-overlay.like  { background: rgba(34,197,94,0.85);  color: #fff; }
.swipe-overlay.skip  { background: rgba(107,114,128,0.8); color: #fff; }
.swipe-overlay.fav   { background: rgba(245,158,11,0.85); color: #fff; }
.swipe-card-wrapper.fly-right { transform: translateX(160%) rotate(20deg) !important; opacity: 0 !important; transition: transform 0.45s ease, opacity 0.45s ease !important; }
.swipe-card-wrapper.fly-left  { transform: translateX(-160%) rotate(-20deg) !important; opacity: 0 !important; transition: transform 0.45s ease, opacity 0.45s ease !important; }
.swipe-card-wrapper.fly-up    { transform: translateY(-130%) scale(0.85) !important; opacity: 0 !important; transition: transform 0.45s ease, opacity 0.45s ease !important; }
.swipe-hint {
  display: flex; justify-content: center; gap: 2rem;
  margin-top: 1rem; font-size: 0.88rem; color: var(--text-muted);
}
.swipe-hint span { display: flex; align-items: center; gap: 0.3rem; }

/* Star burst */
.star-particle {
  position: fixed; pointer-events: none; z-index: 9999;
  font-size: 1.4rem; animation: starFly 0.7s ease-out forwards;
}
@keyframes starFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
}

/* ── Month Strip ───────────────────────────────────────── */
#month-section { padding: 1rem 0 0; }
#month-strip {
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 0.4rem;
  margin-bottom: 0.5rem;
}
.month-cell {
  display: flex; flex-direction: column; align-items: center;
  padding: 0.5rem 0.25rem; border-radius: 10px;
  background: var(--bg-alt); cursor: pointer;
  transition: all 0.2s ease; border: 1.5px solid transparent;
}
.month-cell:hover { border-color: var(--accent); }
.month-cell.active { background: var(--primary); border-color: var(--primary); }
.month-cell.active .month-name,
.month-cell.active .month-count { color: #fff; }
.month-name { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); transition: color 0.2s; }
.month-count { font-size: 0.78rem; font-weight: 600; color: var(--primary); transition: color 0.2s; }

/* ── Search & Grid ─────────────────────────────────────── */
#grid-section { padding: 1.5rem 0; }
#grid-controls {
  display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center;
}
#search-input {
  flex: 1; min-width: 200px;
  padding: 0.6rem 1rem; border-radius: 999px;
  border: 1.5px solid rgba(0,0,0,0.12);
  font-size: 0.95rem; background: var(--card-bg);
  transition: border-color 0.2s;
}
#search-input:focus { outline: none; border-color: var(--accent); }
#results-info { font-size: 0.9rem; color: var(--text-muted); align-self: center; }
#attractions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}
.att-card {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}
.att-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.att-card.best-match { box-shadow: 0 0 0 2px var(--accent), var(--shadow-md); }
.att-card-img-wrap { position: relative; }
.att-card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.att-card-badge {
  position: absolute; top: 0.6rem; left: 0.6rem;
  background: var(--primary); color: #fff;
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 0.2rem 0.5rem; border-radius: 6px;
}
.best-badge {
  position: absolute; top: 0.6rem; right: 0.6rem;
  background: var(--accent); color: #fff;
  font-size: 0.72rem; font-weight: 700;
  padding: 0.2rem 0.5rem; border-radius: 6px;
}
.att-card-fav {
  position: absolute; bottom: 0.5rem; right: 0.6rem;
  background: rgba(0,0,0,0.45); color: #fff;
  border: none; border-radius: 50%;
  width: 32px; height: 32px; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  backdrop-filter: blur(4px);
}
.att-card-fav:hover { transform: scale(1.15); }
.att-card-fav.active { background: rgba(239,68,68,0.85); }
.att-card-body { padding: 1rem 1.1rem 1.1rem; }
.att-card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; font-family: 'Merriweather', serif; }
.att-card-loc { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.att-card-rating { font-size: 0.88rem; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
.att-card-desc { font-size: 1rem; color: var(--text-muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.75rem; }
.att-card-actions { display: flex; gap: 0.5rem; }
.btn-trip {
  flex: 1; padding: 0.5rem 0.75rem; border-radius: 999px;
  border: 1.5px solid var(--primary); background: transparent; color: var(--primary);
  font-size: 0.88rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-trip:hover, .btn-trip.active { background: var(--primary); color: #fff; }
.btn-story {
  flex: 1; padding: 0.5rem 0.75rem; border-radius: 999px;
  background: var(--primary); color: #fff; border: none;
  font-size: 0.88rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
.btn-story:hover { background: var(--primary-dark); }

/* ── Story Overlay ─────────────────────────────────────── */
#story-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
  overflow: hidden;
}
#story-overlay.open { transform: translateY(0); }
#story-close {
  position: fixed; top: 1rem; left: 1rem; z-index: 1100;
  background: rgba(0,0,0,0.5); color: #fff; border: none;
  border-radius: 999px; padding: 0.45rem 1rem;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  backdrop-filter: blur(6px);
  transition: background 0.2s;
}
#story-close:hover { background: rgba(0,0,0,0.75); }
#story-progress {
  position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%);
  z-index: 1100; display: flex; flex-direction: column; gap: 0.65rem;
}
.prog-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(100,100,100,0.4);
  background: rgba(100,100,100,0.2);
  cursor: pointer; transition: all 0.2s;
}
.prog-dot.active {
  background: var(--accent); border-color: var(--accent);
  transform: scale(1.4);
  box-shadow: 0 0 8px rgba(100,100,100,0.4);
  animation: dotPulse 2s ease infinite;
}
@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(100,100,100,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(100,100,100,0); }
}
#chapters-scroll {
  height: 100vh; overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
.chapter {
  height: 100vh; scroll-snap-align: start;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* Ch1 — Discovery */
.ch-discovery {
  background: #111;
}
.ch-discovery .ch-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  animation: kenBurns 14s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  from { transform: scale(1.0) translate(0,0); }
  to   { transform: scale(1.05) translate(-1%, 1%); }
}
.ch-discovery .ch-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
}
.ch-discovery .ch-content {
  position: relative; z-index: 2; text-align: center;
  padding: 2rem; color: #fff; max-width: 700px;
}
.ch1-label {
  font-size: 0.85rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  opacity: 0.8; margin-bottom: 1rem;
}
.ch1-title {
  font-family: 'Merriweather', serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 700; line-height: 1.1; margin-bottom: 0.75rem;
}
.ch1-sub {
  font-size: 1.1rem; opacity: 0.85; margin-bottom: 2rem;
}
.ch-scroll-hint {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.85rem; color: rgba(255,255,255,0.7);
  display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
  animation: bounce 2s ease infinite;
}
@keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(6px); } }

/* Ch2 — The Land */
.ch-land { background: var(--bg-alt); transition: background 0.55s; }
.ch-land .ch-content {
  display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;
  padding: 3rem 4rem; width: 100%; max-width: 1100px; align-items: center;
}
.ch2-text { }
.ch2-chapter-label {
  font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--primary); margin-bottom: 0.75rem; transition: color 0.3s;
}
.ch2-title {
  font-family: 'Merriweather', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 700; line-height: 1.2; margin-bottom: 1rem;
}
.ch2-desc {
  font-size: 1.05rem; line-height: 1.8; color: var(--text-muted);
}
.ch2-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
.ch2-tag {
  background: var(--bg); border: 1px solid rgba(0,0,0,0.1);
  padding: 0.25rem 0.65rem; border-radius: 999px;
  font-size: 0.82rem; color: var(--text-muted);
}
.ch2-img {
  width: 100%; aspect-ratio: 4/3; object-fit: cover;
  border-radius: 16px; box-shadow: var(--shadow-lg);
}

/* Ch3 — Experience */
.ch-experience { background: var(--bg); transition: background 0.55s; }
.ch-experience .ch-content {
  padding: 3rem 4rem; width: 100%; max-width: 800px; text-align: center;
}
.ch3-chapter-label {
  font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--primary); margin-bottom: 0.75rem; transition: color 0.3s;
}
.ch3-title {
  font-family: 'Merriweather', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 700; margin-bottom: 2rem;
}
.activities-grid {
  display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center;
  margin-bottom: 2rem;
}
.activity-pill {
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--bg-alt); border-radius: 999px;
  padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: 500;
  transition: background 0.3s;
}
.ch3-info { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
.ch3-info-item { text-align: center; }
.ch3-info-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.25rem; }
.ch3-info-value { font-size: 1rem; font-weight: 700; color: var(--primary); transition: color 0.3s; }

/* Ch4 — Visit Notes */
.ch-visit { background: #FAF6EE; }
.ch-visit .ch-content {
  padding: 3rem 4rem; width: 100%; max-width: 700px;
}
.ch4-chapter-label {
  font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: #8B6914; margin-bottom: 0.75rem;
}
.ch4-title {
  font-family: 'Merriweather', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 700; margin-bottom: 2rem; color: #2D1B00;
}
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;
}
.stat-box {
  background: #fff; border-radius: 12px;
  padding: 1.1rem 1.25rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8B6914; margin-bottom: 0.35rem; }
.stat-value { font-size: 1.05rem; font-weight: 700; color: #2D1B00; }
.ch4-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.ch4-tag {
  background: #EFE8D4; padding: 0.3rem 0.7rem; border-radius: 999px;
  font-size: 0.82rem; color: #5C4A20;
}

/* Ch5 — Go Now */
.ch-gonow { background: var(--bg-alt); transition: background 0.55s; }
.ch-gonow .ch-content {
  padding: 3rem 4rem; width: 100%; max-width: 900px; text-align: center;
}
.ch5-chapter-label {
  font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--primary); margin-bottom: 0.75rem; transition: color 0.3s;
}
.ch5-title {
  font-family: 'Merriweather', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 700; margin-bottom: 0.75rem;
}
.ch5-rating { font-size: 1.5rem; margin-bottom: 1.5rem; }
.ch5-rating .stars { color: var(--accent); font-size: 1.6rem; }
.ch5-rating .num { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-left: 0.5rem; transition: color 0.3s; }
.ch5-actions { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
.ch5-btn {
  padding: 0.75rem 2rem; border-radius: 999px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; border: 2px solid transparent;
}
.ch5-btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.ch5-btn-primary:hover { background: var(--primary-dark); }
.ch5-btn-secondary { background: transparent; color: var(--primary); border-color: var(--primary); }
.ch5-btn-secondary:hover { background: var(--primary); color: #fff; }
.ch5-related-title { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 1rem; }
.related-cards { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.related-card {
  background: var(--card-bg); border-radius: 12px;
  box-shadow: var(--shadow-sm); overflow: hidden;
  cursor: pointer; width: 200px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.related-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.related-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.related-card-name { padding: 0.5rem 0.6rem; font-size: 0.85rem; font-weight: 600; }

/* ── Bottom Drawer ─────────────────────────────────────── */
#bottom-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  background: var(--card-bg);
  border-top: 1px solid rgba(0,0,0,0.1);
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1), background 0.55s;
  transform: translateY(calc(100% - 52px));
}
#bottom-drawer.expanded { transform: translateY(0); }
#drawer-handle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.25rem; cursor: pointer; height: 52px;
}
.drawer-grip {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px;
}
#drawer-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); transition: color 0.3s; }
#drawer-count {
  background: var(--primary); color: #fff;
  font-size: 0.75rem; font-weight: 700;
  padding: 0.15rem 0.5rem; border-radius: 999px; transition: background 0.3s;
}
#drawer-body {
  max-height: 40vh; overflow-y: auto;
  padding: 0 1.25rem 1.25rem;
}
.drawer-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.6rem 0; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.drawer-item:last-child { border-bottom: none; }
.drawer-item img { width: 48px; height: 36px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.drawer-item-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
.drawer-item-remove {
  background: none; border: none; color: var(--text-muted);
  font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem;
  border-radius: 4px; transition: color 0.2s;
}
.drawer-item-remove:hover { color: #ef4444; }
#drawer-empty { font-size: 0.9rem; color: var(--text-muted); padding: 1rem 0; text-align: center; }

/* ── Toast ─────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: #1a1a1a; color: #fff;
  padding: 0.6rem 1.2rem; border-radius: 999px;
  font-size: 0.9rem; font-weight: 500;
  opacity: 0; transition: all 0.3s; z-index: 2000;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Responsive ────────────────────────────────────────── */
@media (max-width: 768px) {
  #main { padding: 0 1rem 5rem; }
  .ch-land .ch-content { grid-template-columns: 1fr; padding: 2rem 1.5rem; gap: 1.5rem; }
  .ch-land .ch-content .ch2-img { order: -1; }
  .ch-experience .ch-content,
  .ch-visit .ch-content,
  .ch-gonow .ch-content { padding: 2rem 1.5rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  #story-progress { right: 0.6rem; }
  .related-cards { gap: 0.75rem; }
  .related-card { width: 160px; }
}
@media (max-width: 480px) {
  #month-strip { grid-template-columns: repeat(6, 1fr); }
  #attractions-grid { grid-template-columns: 1fr; }
  .ch5-actions { flex-direction: column; align-items: stretch; }
  .stats-grid { grid-template-columns: 1fr; }
}

<script src="../shared/data.js"></script>
<script src="../shared/app.js"></script>
<script>
// ── State ──────────────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SEASON_MONTHS = {
  spring: [2,3,4], summer: [5,6,7], fall: [8,9,10], winter: [11,0,1]
};
const SEASON_EMOJI = { all: '🗺️', spring: '🌸', summer: '☀️', fall: '🍂', winter: '❄️' };
const SEASON_LABEL = { all: 'All Year', spring: 'Spring', summer: 'Summer', fall: 'Fall', winter: 'Winter' };

let currentSeason = 'all';
let activeMonth = null;
let searchQuery = '';
let itinerary = JSON.parse(localStorage.getItem('tourist_itinerary') || '[]');
let favorites = JSON.parse(localStorage.getItem('tourist_favorites') || '[]');
let drawerOpen = false;

// Swipe deck state
let deckAttractions = [];
let deckIndex = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0, dragCurrentX = 0, dragCurrentY = 0;
let cardEl = null;

// ── Utilities ──────────────────────────────────────────────
function save() {
  localStorage.setItem('tourist_itinerary', JSON.stringify(itinerary));
  localStorage.setItem('tourist_favorites', JSON.stringify(favorites));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function updateTripBadge() {
  document.getElementById('trip-badge').textContent = `My Trip (${itinerary.length})`;
  document.getElementById('drawer-count').textContent = itinerary.length;
}

// ── Season detection ───────────────────────────────────────
function attractionMatchesSeason(a, season) {
  if (season === 'all') return true;
  const bt = (a.bestTime || '').toLowerCase();
  if (bt.includes('year-round') || bt.includes('year round') || bt.includes('all year')) return true;
  const monthIdxs = SEASON_MONTHS[season];
  return monthIdxs.some(mi => {
    const m = MONTH_FULL[mi].toLowerCase().slice(0,3);
    return bt.includes(m);
  });
}

function attractionMatchesMonth(a, monthIdx) {
  if (monthIdx === null) return true;
  const bt = (a.bestTime || '').toLowerCase();
  if (bt.includes('year-round') || bt.includes('year round') || bt.includes('all year')) return true;
  const m = MONTH_FULL[monthIdx].toLowerCase().slice(0,3);
  return bt.includes(m);
}

// ── Season Tabs ────────────────────────────────────────────
function initSeasonTabs() {
  const tabs = document.querySelectorAll('.season-tab');

  // compute counts
  ['all','spring','summer','fall','winter'].forEach(s => {
    const count = s === 'all' ? attractions.length :
      attractions.filter(a => attractionMatchesSeason(a, s)).length;
    const tab = document.querySelector(`.season-tab[data-season="${s}"] .tab-count`);
    if (tab) tab.textContent = count;
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentSeason = tab.dataset.season;
      document.body.className = `season-${currentSeason}`;
      activeMonth = null;
      document.querySelectorAll('.month-cell').forEach(c => c.classList.remove('active'));
      document.getElementById('swipe-heading').textContent =
        `${SEASON_EMOJI[currentSeason]} Featured — ${SEASON_LABEL[currentSeason]}`;
      initSwipeDeck();
      renderGrid();
      renderMonthStrip();
    });
  });
}

// ── Month Strip ────────────────────────────────────────────
function renderMonthStrip() {
  const strip = document.getElementById('month-strip');
  strip.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const count = attractions.filter(a =>
      attractionMatchesSeason(a, currentSeason) && attractionMatchesMonth(a, i)
    ).length;
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (activeMonth === i ? ' active' : '');
    cell.innerHTML = `<span class="month-name">${m}</span><span class="month-count">${count}</span>`;
    cell.addEventListener('click', () => {
      if (activeMonth === i) { activeMonth = null; }
      else { activeMonth = i; }
      renderMonthStrip();
      renderGrid();
    });
    strip.appendChild(cell);
  });
}

// ── Card Grid ──────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('attractions-grid');
  const info = document.getElementById('results-info');
  let list = attractions.filter(a =>
    attractionMatchesSeason(a, currentSeason) &&
    attractionMatchesMonth(a, activeMonth)
  );
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.state.toLowerCase().includes(q) ||
      a.region.toLowerCase().includes(q) ||
      (a.category || '').toLowerCase().includes(q)
    );
  }
  info.textContent = `${list.length} attraction${list.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';
  list.forEach(a => {
    const isBest = currentSeason !== 'all' && attractionMatchesSeason(a, currentSeason);
    const inTrip = itinerary.includes(a.id);
    const isFav = favorites.includes(a.id);
    const card = document.createElement('div');
    card.className = 'att-card' + (isBest ? ' best-match' : '');
    card.innerHTML = `
      <div class="att-card-img-wrap">
        <img class="att-card-img" src="../shared/images/${a.slug}.jpg" alt="${a.name}" onerror="this.src='../shared/images/yellowstone.jpg'">
        <span class="att-card-badge">${a.category || 'Landmark'}</span>
        ${isBest ? `<span class="best-badge">✨ Best Match</span>` : ''}
        <button class="att-card-fav${isFav ? ' active' : ''}" data-id="${a.id}" title="Favorite">
          ${isFav ? '♥' : '♡'}
        </button>
      </div>
      <div class="att-card-body">
        <div class="att-card-title">${a.name}</div>
        <div class="att-card-loc">📍 ${a.state} · ${a.region}</div>
        <div class="att-card-rating">${'★'.repeat(Math.round(a.rating))} ${a.rating}</div>
        <div class="att-card-desc">${a.description}</div>
        <div class="att-card-actions">
          <button class="btn-trip${inTrip ? ' active' : ''}" data-id="${a.id}">${inTrip ? '✓ In Trip' : '+ Trip'}</button>
          <button class="btn-story" data-id="${a.id}">Read Story</button>
        </div>
      </div>`;
    card.querySelector('.att-card-fav').addEventListener('click', e => { e.stopPropagation(); toggleFav(a.id, card.querySelector('.att-card-fav')); });
    card.querySelector('.btn-trip').addEventListener('click', e => { e.stopPropagation(); toggleTrip(a.id, card.querySelector('.btn-trip')); });
    card.querySelector('.btn-story').addEventListener('click', e => { e.stopPropagation(); openStory(a.id); });
    card.addEventListener('click', () => openStory(a.id));
    grid.appendChild(card);
  });
}

// ── Favorites & Trip ───────────────────────────────────────
function toggleFav(id, btn) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
    if (btn) { btn.classList.remove('active'); btn.textContent = '♡'; }
    showToast('♡ Removed from favorites');
  } else {
    favorites.push(id);
    if (btn) { btn.classList.add('active'); btn.textContent = '♥'; }
    showToast('♥ Added to favorites');
  }
  save();
}

function toggleTrip(id, btn) {
  if (itinerary.includes(id)) {
    itinerary = itinerary.filter(x => x !== id);
    if (btn) { btn.classList.remove('active'); btn.textContent = '+ Trip'; }
    showToast('Removed from trip');
  } else {
    itinerary.push(id);
    if (btn) { btn.classList.add('active'); btn.textContent = '✓ In Trip'; }
    showToast('✓ Added to trip!');
  }
  save();
  updateTripBadge();
  renderDrawer();
}

// ── Bottom Drawer ──────────────────────────────────────────
function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('bottom-drawer').classList.toggle('expanded', drawerOpen);
}

function renderDrawer() {
  const body = document.getElementById('drawer-body');
  const empty = document.getElementById('drawer-empty');
  if (!itinerary.length) {
    empty.style.display = 'block';
    const existing = body.querySelectorAll('.drawer-item');
    existing.forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';
  body.querySelectorAll('.drawer-item').forEach(el => el.remove());
  itinerary.forEach(id => {
    const a = attractions.find(x => x.id === id);
    if (!a) return;
    const item = document.createElement('div');
    item.className = 'drawer-item';
    item.innerHTML = `
      <img src="../shared/images/${a.slug}.jpg" alt="${a.name}" onerror="this.src='../shared/images/yellowstone.jpg'">
      <span class="drawer-item-name">${a.name}</span>
      <button class="drawer-item-remove" title="Remove">×</button>`;
    item.querySelector('.drawer-item-remove').addEventListener('click', () => {
      itinerary = itinerary.filter(x => x !== id);
      save(); updateTripBadge(); renderDrawer();
      renderGrid();
      showToast('Removed from trip');
    });
    body.insertBefore(item, empty);
  });
}

// ── Swipe Deck ─────────────────────────────────────────────
function initSwipeDeck() {
  const arena = document.getElementById('swipe-arena');
  deckAttractions = attractions
    .filter(a => attractionMatchesSeason(a, currentSeason))
    .sort((a, b) => b.rating - a.rating)
    .slice(0, 10);
  deckIndex = 0;
  renderDeck();
}

function renderDeck() {
  const arena = document.getElementById('swipe-arena');
  arena.innerHTML = '';
  const done = document.createElement('div');
  done.id = 'swipe-done';
  done.style.display = 'none';
  done.innerHTML = `<div class="done-icon">🎉</div><p>All featured picks seen!</p><button onclick="scrollToGrid()">See full grid ↓</button>`;
  arena.appendChild(done);

  if (deckIndex >= deckAttractions.length) {
    done.style.display = 'flex';
    return;
  }

  const show = deckAttractions.slice(deckIndex, deckIndex + 3);
  show.reverse().forEach((a, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'swipe-card-wrapper';
    wrapper.dataset.id = a.id;
    wrapper.innerHTML = `
      <div class="swipe-card">
        <div class="swipe-overlay like">ADDED ✓</div>
        <div class="swipe-overlay skip">SKIP</div>
        <div class="swipe-overlay fav">★ FAVORITE!</div>
        <img class="swipe-card-img" src="../shared/images/${a.slug}.jpg" alt="${a.name}" onerror="this.src='../shared/images/yellowstone.jpg'">
        <div class="swipe-card-body">
          <div class="swipe-card-title">${a.name}</div>
          <div class="swipe-card-meta">📍 ${a.state} · ★ ${a.rating}</div>
          <div class="swipe-card-desc">${a.description}</div>
        </div>
      </div>`;
    arena.insertBefore(wrapper, done);
    if (i === show.length - 1) {
      initSwipeDrag(wrapper, a);
    }
  });
}

function initSwipeDrag(wrapper, attraction) {
  const card = wrapper.querySelector('.swipe-card');
  const overlayLike = wrapper.querySelector('.swipe-overlay.like');
  const overlaySkip = wrapper.querySelector('.swipe-overlay.skip');
  const overlayFav  = wrapper.querySelector('.swipe-overlay.fav');

  function onStart(x, y) {
    isDragging = true; dragStartX = x; dragStartY = y;
    dragCurrentX = x; dragCurrentY = y;
    wrapper.style.transition = 'none';
  }
  function onMove(x, y) {
    if (!isDragging) return;
    dragCurrentX = x; dragCurrentY = y;
    const dx = dragCurrentX - dragStartX;
    const dy = dragCurrentY - dragStartY;
    const rot = dx * 0.08;
    wrapper.style.transform = `translateX(${dx}px) translateY(${dy}px) rotate(${rot}deg)`;
    const threshold = wrapper.offsetWidth * 0.3;
    overlayLike.style.opacity = dx > 20 ? Math.min((dx - 20) / threshold, 1) : 0;
    overlaySkip.style.opacity = dx < -20 ? Math.min((-dx - 20) / threshold, 1) : 0;
    overlayFav.style.opacity  = dy < -30 ? Math.min((-dy - 30) / threshold, 1) : 0;
  }
  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    wrapper.style.transition = '';
    const dx = dragCurrentX - dragStartX;
    const dy = dragCurrentY - dragStartY;
    const threshold = wrapper.offsetWidth * 0.35;
    if (dy < -threshold && Math.abs(dy) > Math.abs(dx)) {
      doSwipe('up', wrapper, attraction);
    } else if (dx > threshold) {
      doSwipe('right', wrapper, attraction);
    } else if (dx < -threshold) {
      doSwipe('left', wrapper, attraction);
    } else {
      wrapper.style.transform = '';
      overlayLike.style.opacity = 0;
      overlaySkip.style.opacity = 0;
      overlayFav.style.opacity  = 0;
    }
  }

  wrapper.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { if (isDragging) onEnd(); });
  wrapper.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  wrapper.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  wrapper.addEventListener('touchend', onEnd);
}

function doSwipe(dir, wrapper, attraction) {
  if (dir === 'right') {
    wrapper.classList.add('fly-right');
    if (!itinerary.includes(attraction.id)) {
      itinerary.push(attraction.id); save(); updateTripBadge(); renderDrawer();
    }
    showToast('✓ Added to trip!');
  } else if (dir === 'left') {
    wrapper.classList.add('fly-left');
    showToast('Skipped');
  } else if (dir === 'up') {
    wrapper.classList.add('fly-up');
    starBurst(wrapper);
    if (!favorites.includes(attraction.id)) {
      favorites.push(attraction.id); save();
    }
    showToast('★ Favorited!');
  }
  deckIndex++;
  setTimeout(() => { renderDeck(); renderGrid(); }, 450);
}

function starBurst(wrapper) {
  const rect = wrapper.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 3;
  const symbols = ['★','✦','✧','✨','⭐'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'star-particle';
    p.textContent = symbols[i % symbols.length];
    const angle = (i / 10) * Math.PI * 2;
    const dist = 80 + Math.random() * 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 40;
    p.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;animation-delay:${i * 0.04}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function scrollToGrid() {
  document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
}

// Keyboard swipe
document.addEventListener('keydown', e => {
  if (document.getElementById('story-overlay').classList.contains('open')) return;
  const arena = document.getElementById('swipe-arena');
  const topWrapper = arena.querySelector('.swipe-card-wrapper:last-child');
  if (!topWrapper) return;
  const a = attractions.find(x => x.id === parseInt(topWrapper.dataset.id));
  if (!a) return;
  if (e.key === 'ArrowRight') doSwipe('right', topWrapper, a);
  if (e.key === 'ArrowLeft')  doSwipe('left',  topWrapper, a);
  if (e.key === 'ArrowUp')    doSwipe('up',    topWrapper, a);
});

// ── Story Overlay ──────────────────────────────────────────
function openStory(id) {
  const a = attractions.find(x => x.id === id);
  if (!a) return;
  document.body.style.overflow = 'hidden';
  const overlay = document.getElementById('story-overlay');
  buildStory(a);
  overlay.classList.add('open');
  jumpToChapter(0);
}

function closeStory() {
  document.getElementById('story-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  const overlay = document.getElementById('story-overlay');
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape') closeStory();
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    const active = parseInt(document.querySelector('.prog-dot.active')?.dataset.ch || '0');
    if (active < 4) jumpToChapter(active + 1);
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    const active = parseInt(document.querySelector('.prog-dot.active')?.dataset.ch || '0');
    if (active > 0) jumpToChapter(active - 1);
  }
});

function jumpToChapter(n) {
  const scroll = document.getElementById('chapters-scroll');
  const chapters = scroll.querySelectorAll('.chapter');
  if (chapters[n]) chapters[n].scrollIntoView({ behavior: 'smooth' });
  document.querySelectorAll('.prog-dot').forEach((d, i) => d.classList.toggle('active', i === n));
}

function buildStory(a) {
  const scroll = document.getElementById('chapters-scroll');
  const actIcons = { 'Hiking':'🥾','Camping':'🏕️','Swimming':'🏊','Kayaking':'🛶','Fishing':'🎣','Wildlife Watching':'🦌','Photography':'📷','Skiing':'⛷️','Rock Climbing':'🧗','Stargazing':'🌟','Cycling':'🚴','Snorkeling':'🤿','Surfing':'🏄','Bird Watching':'🦅','Horseback Riding':'🐎' };
  const getIcon = act => actIcons[act] || '🌿';

  // Related attractions (same region, not same)
  const related = attractions.filter(x => x.region === a.region && x.id !== a.id).slice(0, 3);

  scroll.innerHTML = `
    <!-- Ch1: Discovery -->
    <div class="chapter ch-discovery">
      <div class="ch-bg" style="background-image:url('../shared/images/${a.slug}.jpg')"></div>
      <div class="ch-overlay"></div>
      <div class="ch-content">
        <div class="ch1-label">Chapter 1 · Discovery</div>
        <h2 class="ch1-title">${a.name}</h2>
        <p class="ch1-sub">📍 ${a.state} &nbsp;·&nbsp; ${a.region}</p>
      </div>
      <div class="ch-scroll-hint">↓ Scroll to explore</div>
    </div>

    <!-- Ch2: The Land -->
    <div class="chapter ch-land">
      <div class="ch-content">
        <div class="ch2-text">
          <div class="ch2-chapter-label">Chapter 2 · The Land</div>
          <h2 class="ch2-title">${a.name}</h2>
          <p class="ch2-desc">${a.description}</p>
          <div class="ch2-tags">
            <span class="ch2-tag">${a.category || 'Landmark'}</span>
            <span class="ch2-tag">${a.region}</span>
            <span class="ch2-tag">${a.state}</span>
          </div>
        </div>
        <img class="ch2-img" src="../shared/images/${a.slug}.jpg" alt="${a.name}" onerror="this.src='../shared/images/yellowstone.jpg'">
      </div>
    </div>

    <!-- Ch3: Experience -->
    <div class="chapter ch-experience">
      <div class="ch-content">
        <div class="ch3-chapter-label">Chapter 3 · Experience</div>
        <h2 class="ch3-title">What Awaits You</h2>
        <div class="activities-grid">
          ${(a.activities || []).map(act => `<div class="activity-pill">${getIcon(act)} ${act}</div>`).join('')}
        </div>
        <div class="ch3-info">
          <div class="ch3-info-item">
            <div class="ch3-info-label">Difficulty</div>
            <div class="ch3-info-value">${a.difficulty || 'Varies'}</div>
          </div>
          <div class="ch3-info-item">
            <div class="ch3-info-label">Duration</div>
            <div class="ch3-info-value">${a.duration || '1–2 days'}</div>
          </div>
          <div class="ch3-info-item">
            <div class="ch3-info-label">Accessibility</div>
            <div class="ch3-info-value">${a.accessibility ? '♿ Accessible' : 'Limited'}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Ch4: Visit Notes -->
    <div class="chapter ch-visit">
      <div class="ch-content">
        <div class="ch4-chapter-label">Chapter 4 · Visit Notes</div>
        <h2 class="ch4-title">Plan Your Visit</h2>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-label">Entrance Fee</div><div class="stat-value">${a.fee || 'Free'}</div></div>
          <div class="stat-box"><div class="stat-label">Best Time</div><div class="stat-value">${a.bestTime || 'Year-round'}</div></div>
          <div class="stat-box"><div class="stat-label">Trip Duration</div><div class="stat-value">${a.duration || '1–2 days'}</div></div>
          <div class="stat-box"><div class="stat-label">Difficulty</div><div class="stat-value">${a.difficulty || 'Varies'}</div></div>
        </div>
        <div class="ch4-tags">
          ${(a.tags || []).map(t => `<span class="ch4-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- Ch5: Go Now -->
    <div class="chapter ch-gonow">
      <div class="ch-content">
        <div class="ch5-chapter-label">Chapter 5 · Go Now</div>
        <h2 class="ch5-title">${a.name}</h2>
        <div class="ch5-rating">
          <span class="stars">${'★'.repeat(Math.round(a.rating))}</span>
          <span class="num">${a.rating} · ${(a.reviews || 0).toLocaleString()} reviews</span>
        </div>
        <div class="ch5-actions">
          <button class="ch5-btn ch5-btn-primary" id="ch5-trip-btn" onclick="storyToggleTrip(${a.id})">
            ${itinerary.includes(a.id) ? '✓ In Trip' : '+ Add to Trip'}
          </button>
          <button class="ch5-btn ch5-btn-secondary" id="ch5-fav-btn" onclick="storyToggleFav(${a.id})">
            ${favorites.includes(a.id) ? '♥ Favorited' : '♡ Favorite'}
          </button>
        </div>
        ${related.length ? `
        <div class="ch5-related-title">More in ${a.region}</div>
        <div class="related-cards">
          ${related.map(r => `
            <div class="related-card" onclick="openStory(${r.id})">
              <img src="../shared/images/${r.slug}.jpg" alt="${r.name}" onerror="this.src='../shared/images/yellowstone.jpg'">
              <div class="related-card-name">${r.name}</div>
            </div>`).join('')}
        </div>` : ''}
      </div>
    </div>`;

  // IntersectionObserver for progress dots
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = Array.from(scroll.querySelectorAll('.chapter')).indexOf(entry.target);
        document.querySelectorAll('.prog-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
      }
    });
  }, { root: scroll, threshold: 0.5 });
  scroll.querySelectorAll('.chapter').forEach(ch => observer.observe(ch));
}

function storyToggleTrip(id) {
  toggleTrip(id, null);
  const btn = document.getElementById('ch5-trip-btn');
  if (btn) btn.textContent = itinerary.includes(id) ? '✓ In Trip' : '+ Add to Trip';
}
function storyToggleFav(id) {
  toggleFav(id, null);
  const btn = document.getElementById('ch5-fav-btn');
  if (btn) btn.textContent = favorites.includes(id) ? '♥ Favorited' : '♡ Favorite';
}

// ── Search ─────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(renderGrid, 180);
});

// ── Init ───────────────────────────────────────────────────
initSeasonTabs();
renderMonthStrip();
renderGrid();
initSwipeDeck();
updateTripBadge();
renderDrawer();
</script>
</body>
</html>
