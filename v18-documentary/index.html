<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes — Documentary Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FIELD NOTES — Documentary Series
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c8a96e;
  --gold-light: #e8d5a8;
  --gold-dim: #7a6240;
  --black: #0f0f0f;
  --ink: #1a1208;
  --forest: #0a1a0a;
  --parchment: #f5e6c8;
  --parchment-dark: #e8d0a0;
  --white: #f0ead8;
  --text-muted: rgba(240, 234, 216, 0.6);

  /* Chapter palette */
  --ch1-bg: #0f0f0f;
  --ch2-bg: #1a1208;
  --ch3-bg: #0a1a0a;
  --ch4-bg: #f5e6c8;
  --ch5-bg: #0f0f0f;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Merriweather', Georgia, serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  transition: background-color 0.8s ease;
}

/* ============================================================
   FILM GRAIN OVERLAY
   ============================================================ */
.grain-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  animation: grain 0.4s steps(1) infinite;
}
@keyframes grain {
  0%   { transform: translate(0,0); }
  10%  { transform: translate(-2%,-3%); }
  20%  { transform: translate(3%,1%); }
  30%  { transform: translate(-1%,4%); }
  40%  { transform: translate(4%,-2%); }
  50%  { transform: translate(-3%,3%); }
  60%  { transform: translate(2%,-4%); }
  70%  { transform: translate(-4%,2%); }
  80%  { transform: translate(3%,-1%); }
  90%  { transform: translate(-2%,4%); }
  100% { transform: translate(0,0); }
}

/* ============================================================
   HOME SCREEN — EPISODE GRID
   ============================================================ */
#home-screen {
  min-height: 100vh;
  background: var(--black);
  display: flex;
  flex-direction: column;
}

/* Site Header */
.site-header {
  padding: 3rem 4rem 2rem;
  border-bottom: 1px solid rgba(200,169,110,0.2);
  position: relative;
}

.site-logo {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  font-size: clamp(2rem, 5vw, 3.5rem);
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  line-height: 1;
}

.site-subtitle {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 0.5rem;
}

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.5rem 4rem;
  border-bottom: 1px solid rgba(200,169,110,0.1);
  flex-wrap: wrap;
  background: rgba(15,15,15,0.95);
  position: sticky;
  top: 0;
  z-index: 100;
}

.region-tabs {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  flex: 1;
}

.region-tab {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.4rem 0.85rem;
  border: 1px solid rgba(200,169,110,0.3);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}

.region-tab:hover,
.region-tab.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(200,169,110,0.08);
}

.search-wrap {
  position: relative;
}

.search-input {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem 0.5rem 2.2rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(200,169,110,0.2);
  color: var(--white);
  width: 220px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--gold); }

.search-icon {
  position: absolute;
  left: 0.7rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}

/* Episode grid */
.episode-grid-wrap {
  padding: 2.5rem 4rem 4rem;
  flex: 1;
}

.episode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
}

@media (max-width: 1100px) { .episode-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 680px)  {
  .episode-grid { grid-template-columns: 1fr; }
  .site-header, .filter-bar, .episode-grid-wrap { padding-left: 1.5rem; padding-right: 1.5rem; }
}

.episode-card {
  background: #171717;
  border: 1px solid rgba(200,169,110,0.1);
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  position: relative;
  overflow: hidden;
}

.episode-card:hover {
  transform: translateY(-4px);
  border-color: rgba(200,169,110,0.5);
  box-shadow: 0 12px 40px rgba(200,169,110,0.12);
}

.ep-number {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  padding: 0.8rem 1rem 0;
}

.ep-image-wrap {
  position: relative;
  aspect-ratio: 16 / 9;
  overflow: hidden;
}

.ep-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.episode-card:hover .ep-image-wrap img { transform: scale(1.04); }

/* Vignette */
.ep-image-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
}

.ep-body {
  padding: 1rem 1.1rem 1.3rem;
}

.ep-title {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-size: 1rem;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 0.4rem;
}

.ep-teaser {
  font-family: 'Merriweather', serif;
  font-size: 0.72rem;
  color: var(--text-muted);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.75rem;
}

.ep-tags {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.85rem;
}

.ep-tag {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.55rem;
  border: 1px solid rgba(200,169,110,0.25);
  color: var(--gold-dim);
}

.ep-tag.region { border-color: rgba(200,169,110,0.5); color: var(--gold); }

.ep-watch-btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.55rem 1.1rem;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}

.ep-watch-btn:hover {
  background: var(--gold);
  color: var(--black);
}

/* No results */
.no-results {
  grid-column: 1/-1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--text-muted);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
}

/* ============================================================
   DOCUMENTARY VIEWER
   ============================================================ */
#doc-viewer {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: var(--black);
}

#doc-viewer.active { display: block; }

/* Back button */
.back-btn {
  position: fixed;
  top: 1.5rem;
  left: 1.75rem;
  z-index: 600;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(15,15,15,0.85);
  border: 1px solid rgba(200,169,110,0.3);
  padding: 0.5rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}

.back-btn:hover {
  background: rgba(200,169,110,0.15);
  border-color: var(--gold);
}

/* Episode counter overlay */
.ep-counter {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 600;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(15,15,15,0.8);
  padding: 0.4rem 1rem;
  backdrop-filter: blur(6px);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.4s;
}

/* Chapter scroll container */
.chapters-scroll {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}

.chapters-scroll::-webkit-scrollbar { display: none; }

/* Progress indicator */
.progress-dots {
  position: fixed;
  right: 1.5rem;
  top: 50%;
  transform: translateY(-50%);
  z-index: 600;
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
}

.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(200,169,110,0.25);
  border: 1.5px solid rgba(200,169,110,0.4);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.progress-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
}

.progress-dot.active {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(200,169,110,0.6);
  transform: scale(1.3);
}

/* ============================================================
   CHAPTER BASE
   ============================================================ */
.chapter {
  height: 100vh;
  scroll-snap-align: start;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chapter-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

/* ============================================================
   CHAPTER 1 — DISCOVERY
   ============================================================ */
.chapter-1 {
  background: var(--ch1-bg);
}

.ch1-bg-image {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.ch1-bg-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: kenBurns 14s ease-in-out infinite alternate;
}

@keyframes kenBurns {
  from { transform: scale(1.0) translate(0, 0); }
  to   { transform: scale(1.05) translate(-1%, 1%); }
}

.ch1-bg-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.4) 0%,
    rgba(0,0,0,0.2) 40%,
    rgba(0,0,0,0.65) 80%,
    rgba(15,15,15,1) 100%
  );
}

.ch1-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 900px;
}

.ch1-ep {
  color: var(--gold);
  margin-bottom: 1.5rem;
  letter-spacing: 0.4em;
}

.ch1-title {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-style: italic;
  font-size: clamp(3rem, 8vw, 6rem);
  color: var(--white);
  line-height: 1.05;
  margin-bottom: 1.2rem;
  text-shadow: 0 2px 30px rgba(0,0,0,0.8);
}

.ch1-meta {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 0.5rem;
}

.ch1-region {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  color: var(--gold);
  animation: bounceDown 2s ease-in-out infinite;
}

.scroll-hint span {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.scroll-hint svg {
  width: 20px;
  height: 20px;
  opacity: 0.7;
}

@keyframes bounceDown {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
  50%       { transform: translateX(-50%) translateY(6px); opacity: 1; }
}

/* ============================================================
   CHAPTER 2 — THE LAND
   ============================================================ */
.chapter-2 {
  background: var(--ch2-bg);
}

.ch2-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100%;
  width: 100%;
}

.ch2-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem 3.5rem 4rem 5rem;
  overflow-y: auto;
}

.ch2-chapter-num {
  color: var(--gold-dim);
  margin-bottom: 0.75rem;
}

.ch2-heading {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-style: italic;
  font-size: clamp(2rem, 4vw, 3.2rem);
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 1.5rem;
}

.ch2-description {
  font-family: 'Merriweather', serif;
  font-size: 0.95rem;
  line-height: 1.9;
  color: var(--white);
  opacity: 0.85;
  margin-bottom: 2rem;
}

.terrain-features {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.terrain-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.4rem;
}

.terrain-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.terrain-tag {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  border: 1px solid rgba(200,169,110,0.35);
  color: var(--gold-light);
}

.ch2-image-side {
  position: relative;
  overflow: hidden;
}

.ch2-image-side img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  will-change: transform;
}

.ch2-image-side::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(to right, rgba(26,18,8,0.7) 0%, transparent 40%);
}

.ch2-category-badge {
  position: absolute;
  bottom: 2rem;
  right: 2rem;
  z-index: 2;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 0.4rem 0.85rem;
  background: rgba(26,18,8,0.85);
  backdrop-filter: blur(4px);
}

/* ============================================================
   CHAPTER 3 — WILDLIFE & WONDER
   ============================================================ */
.chapter-3 {
  background: var(--ch3-bg);
}

.ch3-content {
  width: 100%;
  max-width: 900px;
  padding: 3rem 2rem;
}

.ch3-chapter-num {
  color: rgba(144,238,144,0.5);
  margin-bottom: 0.75rem;
}

.ch3-heading {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-style: italic;
  font-size: clamp(2rem, 4vw, 3rem);
  color: #c8e6c8;
  line-height: 1.1;
  margin-bottom: 2rem;
}

.field-obs-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(144,238,144,0.5);
  margin-bottom: 1rem;
}

.field-observations {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.field-obs-item {
  padding: 0.85rem 1rem;
  border: 1px solid rgba(144,238,144,0.15);
  background: rgba(144,238,144,0.03);
  display: flex;
  align-items: center;
  gap: 0.65rem;
  transition: border-color 0.2s, background 0.2s;
}

.field-obs-item:hover {
  border-color: rgba(144,238,144,0.35);
  background: rgba(144,238,144,0.06);
}

.obs-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
}

.obs-name {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #a8d8a8;
}

.expedition-notes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.exp-note {
  border-left: 2px solid rgba(144,238,144,0.3);
  padding-left: 1.2rem;
}

.exp-note-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(144,238,144,0.45);
  margin-bottom: 0.3rem;
}

.exp-note-value {
  font-family: 'Merriweather', serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: #c8e6c8;
  line-height: 1.4;
}

/* ============================================================
   CHAPTER 4 — PRACTICAL NOTES (PARCHMENT)
   ============================================================ */
.chapter-4 {
  background: var(--ch4-bg);
}

.ch4-notebook {
  position: relative;
  background: #fdf5e0;
  max-width: 680px;
  width: 100%;
  padding: 3.5rem 3.5rem 3rem 5rem;
  box-shadow: 0 8px 60px rgba(0,0,0,0.3), inset -1px 0 0 rgba(0,0,0,0.05);
  border-left: 3px solid #d4a96e;
}

/* Ruled lines */
.ch4-notebook::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 3.5rem;
  bottom: 3rem;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent calc(2.1rem - 1px),
    rgba(200,169,110,0.18) calc(2.1rem - 1px),
    rgba(200,169,110,0.18) 2.1rem
  );
  pointer-events: none;
}

/* Margin line */
.ch4-notebook::after {
  content: '';
  position: absolute;
  left: 3.5rem;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(200,0,0,0.2);
  pointer-events: none;
}

.ch4-chapter-num {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.75rem;
}

.ch4-heading {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-style: italic;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  color: #2a1a08;
  line-height: 1.15;
  margin-bottom: 2rem;
}

.notebook-entries {
  display: flex;
  flex-direction: column;
  gap: 1.4rem;
}

.notebook-entry {
  position: relative;
}

.nb-key {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #8b6914;
  margin-bottom: 0.2rem;
}

.nb-value {
  font-family: 'Merriweather', serif;
  font-size: 1rem;
  font-weight: 400;
  color: #2a1a08;
  line-height: 1.6;
}

.nb-value.handwriting {
  font-style: italic;
  font-weight: 700;
  color: #1a0a02;
}

/* ============================================================
   CHAPTER 5 — GO NOW
   ============================================================ */
.chapter-5 {
  background: var(--ch5-bg);
}

.ch5-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.ch5-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.35);
  animation: kenBurns 16s ease-in-out infinite alternate-reverse;
}

.ch5-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,15,15,0.5) 0%,
    rgba(15,15,15,0.3) 50%,
    rgba(15,15,15,0.7) 100%
  );
}

.ch5-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 680px;
}

.ch5-chapter-num {
  color: var(--gold-dim);
  margin-bottom: 1rem;
  letter-spacing: 0.35em;
}

.ch5-heading {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-style: italic;
  font-size: clamp(2rem, 5vw, 3.8rem);
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 0.75rem;
}

.ch5-subheading {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 2rem;
}

.ch5-rating-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  margin-bottom: 2.5rem;
}

.ch5-stars {
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}

.ch5-rating-num {
  font-family: 'Merriweather', serif;
  font-weight: 900;
  font-size: 2rem;
  color: var(--gold);
}

.ch5-dispatches {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.ch5-dispatches strong {
  font-size: 0.9rem;
  color: var(--white);
}

.ch5-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-expedition {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.85rem 2rem;
  background: var(--gold);
  color: var(--black);
  border: none;
  cursor: pointer;
  transition: all 0.25s;
}

.btn-expedition:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(200,169,110,0.35);
}

.btn-expedition.added {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
}

.btn-heart {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1.1rem;
  padding: 0.85rem 1.2rem;
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.25s;
}

.btn-heart:hover, .btn-heart.active {
  color: #e87070;
  border-color: #e87070;
}

.btn-next-ep {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.85rem 1.5rem;
  background: transparent;
  color: var(--gold);
  border: 1px solid rgba(200,169,110,0.4);
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}

.btn-next-ep:hover {
  border-color: var(--gold);
  background: rgba(200,169,110,0.1);
}

/* ============================================================
   RELATED STORIES SIDEBAR
   ============================================================ */
.related-sidebar {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  z-index: 550;
  background: rgba(15,15,15,0.95);
  border-left: 1px solid rgba(200,169,110,0.15);
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.5s ease;
  opacity: 0;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.related-sidebar.visible {
  transform: translateX(0);
  opacity: 1;
}

.sidebar-header {
  padding: 1.5rem 1.2rem 1rem;
  border-bottom: 1px solid rgba(200,169,110,0.1);
}

.sidebar-title {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.2rem;
}

.sidebar-subtitle {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(200,169,110,0.2) transparent;
}

.sidebar-section {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid rgba(200,169,110,0.08);
}

.sidebar-section-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

.sidebar-ep-card {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  margin-bottom: 0.8rem;
  cursor: pointer;
  padding: 0.4rem;
  transition: background 0.2s;
}

.sidebar-ep-card:hover { background: rgba(200,169,110,0.05); }

.sidebar-ep-img {
  width: 52px;
  height: 36px;
  object-fit: cover;
  flex-shrink: 0;
}

.sidebar-ep-info { flex: 1; min-width: 0; }

.sidebar-ep-num {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--gold-dim);
  text-transform: uppercase;
}

.sidebar-ep-name {
  font-family: 'Merriweather', serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-add-btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0.25rem 0.5rem;
  background: transparent;
  color: var(--gold);
  border: 1px solid rgba(200,169,110,0.35);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}

.sidebar-add-btn:hover,
.sidebar-add-btn.added {
  background: var(--gold);
  color: var(--black);
}

/* Expedition list in sidebar */
.expedition-list { padding: 0.75rem 1.2rem; }

.expedition-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(200,169,110,0.07);
}

.expedition-item-name {
  font-family: 'Merriweather', serif;
  font-size: 0.65rem;
  color: var(--white);
  line-height: 1.3;
  flex: 1;
  padding-right: 0.4rem;
}

.expedition-remove {
  font-size: 0.7rem;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 0.2rem;
  transition: color 0.2s;
}

.expedition-remove:hover { color: #e87070; }

.expedition-empty {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  color: var(--text-muted);
  text-align: center;
  padding: 1rem 0;
  font-style: italic;
}

/* Mobile expedition badge */
.expedition-badge {
  display: none;
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 700;
  background: var(--gold);
  color: var(--black);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.2;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(200,169,110,0.4);
}

.badge-count {
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1;
}

@media (max-width: 900px) {
  .related-sidebar { display: none; }
  .expedition-badge { display: flex; }
  .progress-dots { right: 0.75rem; }
  .ch2-layout { grid-template-columns: 1fr; }
  .ch2-image-side { display: none; }
  .ch2-text { padding: 2rem 1.5rem; }
  .ch4-notebook { padding: 2.5rem 1.5rem 2rem 2.5rem; }
  .expedition-notes { grid-template-columns: 1fr; }
}

/* ============================================================
   UTILITY / ANIMATIONS
   ============================================================ */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Chapter transition pulse on progress dots */
@keyframes dotPulse {
  0%   { box-shadow: 0 0 0 0 rgba(200,169,110,0.6); }
  70%  { box-shadow: 0 0 0 8px rgba(200,169,110,0); }
  100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
}

.progress-dot.active {
  animation: dotPulse 1s ease-out;
}

/* Scroll cue line */
.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  margin: 0 auto;
}

/* ============================================================
   LOADING STATE
   ============================================================ */
.loading-state {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  color: var(--text-muted);
}

.loading-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  display: inline-block;
  animation: loadPulse 1.2s ease-in-out infinite;
  margin: 0 3px;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes loadPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%           { transform: scale(1.0); opacity: 1; }
}
</style>
</head>
<body>

<div class="grain-overlay"></div>

<!-- ============================================================
     HOME SCREEN
     ============================================================ -->
<div id="home-screen">

  <header class="site-header">
    <div class="site-logo">Field Notes</div>
    <div class="site-subtitle">Documentary Series &nbsp;·&nbsp; 100 Wild Places</div>
  </header>

  <div class="filter-bar">
    <div class="region-tabs" id="region-tabs">
      <button class="region-tab active" data-region="">All Episodes</button>
    </div>
    <div class="search-wrap">

        <span class="loading-dot"></span>

</div>

<!-- ============================================================
     DOCUMENTARY VIEWER
     ============================================================ -->
<div id="doc-viewer">

  <button class="back-btn" id="back-btn">&#8592; All Episodes</button>

  <div class="ep-counter" id="ep-counter">EP. 001 — Yellowstone National Park</div>

  <div class="progress-dots" id="progress-dots">
    <div class="progress-dot active" data-ch="0" title="Discovery"></div>
    <div class="progress-dot" data-ch="1" title="The Land"></div>
    <div class="progress-dot" data-ch="2" title="Wildlife &amp; Wonder"></div>
    <div class="progress-dot" data-ch="3" title="Practical Notes"></div>
    <div class="progress-dot" data-ch="4" title="Go Now"></div>
  </div>

  <div class="chapters-scroll" id="chapters-scroll">
    <!-- Chapters injected by JS -->
  </div>

  <!-- Related Stories Sidebar -->
  <aside class="related-sidebar" id="related-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Related Field Notes</div>
      <div class="sidebar-subtitle" id="sidebar-region-label">Same region</div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Nearby Episodes</div>
        <div id="sidebar-related"></div>
      </div>
      <div>
        <div class="sidebar-section-label" style="padding: 0.75rem 1.2rem 0.3rem; font-size:0.55rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-muted)">
          My Expedition
        </div>
        <div class="expedition-list" id="sidebar-itinerary"></div>
      </div>
    </div>
  </aside>

</div>

<!-- Mobile expedition badge -->
<div class="expedition-badge" id="expedition-badge" style="display:none">
  <span class="badge-count" id="badge-count">0</span>
  <span>trips</span>
</div>

<script src="../shared/data.js"></script>
<script src="../shared/app.js"></script>
<script>
// ============================================================
//  FIELD NOTES — Documentary Series
//  Main Application Script
// ============================================================

// ---- Activity icon map ----------------------------------------
const ACTIVITY_ICONS = {
  'Hiking':           '🥾',
  'Rock Climbing':    '🧗',
  'Camping':          '⛺',
  'Photography':      '📷',
  'Wildlife Watching':'🦅',
  'Stargazing':       '🌌',
  'Rafting':          '🚣',
  'Kayaking':         '🛶',
  'Fishing':          '🎣',
  'Swimming':         '🏊',
  'Snorkeling':       '🤿',
  'Skiing':           '⛷️',
  'Snowshoeing':      '🌨️',
  'Cycling':          '🚴',
  'Bird Watching':    '🦜',
  'Scenic Driving':   '🚗',
  'Mule Rides':       '🐴',
  'Canyoneering':     '⛰️',
  'Tide Pooling':     '🐚',
  'Backpacking':      '🎒',
  'Cave Tours':       '🦇',
  'Whale Watching':   '🐋',
  'Surfing':          '🏄',
  'Horseback Riding': '🐎',
};

function activityIcon(act) {
  return ACTIVITY_ICONS[act] || '🌿';
}

// ---- Episode number formatter ---------------------------------
function epNum(idx) {
  return 'EP. ' + String(idx + 1).padStart(3, '0');
}

// ---- Stars helper ---------------------------------------------
function starsFull(rating) {
  return '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
}

// ---- Gather all regions ---------------------------------------
let allAttractions = [];
let currentAttraction = null;
let currentIndex = 0;
let currentChapter = 0;
let sidebarVisible = false;
let activeRegion = '';
let searchQuery = '';

// ---- Build home screen ----------------------------------------
function buildHome() {
  // Combine all data pages
  allAttractions = (typeof attractions !== 'undefined') ? [...attractions] : [];

  // Regions
  const regions = [...new Set(allAttractions.map(a => a.region))].sort();
  const tabsEl = document.getElementById('region-tabs');

  regions.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'region-tab';
    btn.dataset.region = r;
    btn.textContent = r;
    tabsEl.appendChild(btn);
  });

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('episode-grid');
  const filtered = App.filterAttractions(allAttractions, {
    search: searchQuery,
    region: activeRegion
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No field notes match your search.</div>';
    return;
  }

  grid.innerHTML = filtered.map(a => {
    const idx = allAttractions.indexOf(a);
    const teaser = a.description.slice(0, 120).trim() + '…';
    return `
      <article class="episode-card" data-id="${a.id}">
        <div class="ep-number">${epNum(idx)}</div>
        <div class="ep-image-wrap">
          <img src="${a.image}" alt="${a.name}" loading="lazy"
               onerror="this.src='https://picsum.photos/seed/fn${a.id}/800/450'">
        </div>
        <div class="ep-body">
          <h3 class="ep-title">${a.name}</h3>
          <p class="ep-teaser">${teaser}</p>
          <div class="ep-tags">
            <span class="ep-tag region">${a.region}</span>
            <span class="ep-tag">${a.difficulty}</span>
          </div>
          <button class="ep-watch-btn" data-watch="${a.id}">Watch</button>
        </div>
      </article>`;
  }).join('');
}

// ---- Region tabs & search ------------------------------------
document.getElementById('region-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.region-tab');
  if (!btn) return;
  document.querySelectorAll('.region-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeRegion = btn.dataset.region;
  renderGrid();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

// ---- Episode card click ----------------------------------------
document.getElementById('episode-grid').addEventListener('click', e => {
  const card = e.target.closest('.episode-card');
  if (!card) return;
  const watchBtn = e.target.closest('[data-watch]');
  if (!watchBtn && !e.target.closest('.ep-watch-btn') && !e.target.closest('.ep-image-wrap') && !e.target.closest('.ep-title')) return;

  const id = parseInt(card.dataset.id);
  const attraction = allAttractions.find(a => a.id === id);
  if (attraction) openDocumentary(attraction);
});

// ---- Build & open documentary --------------------------------
function openDocumentary(attraction) {
  currentAttraction = attraction;
  currentIndex = allAttractions.indexOf(attraction);
  currentChapter = 0;
  sidebarVisible = false;

  buildChapters(attraction);
  updateEpCounter(attraction);
  updateProgressDots(0);
  updateSidebar(attraction);
  updateItinerarySidebar();

  document.getElementById('doc-viewer').classList.add('active');
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('ep-counter').style.opacity = '1';

  // Reset scroll
  const scroll = document.getElementById('chapters-scroll');
  scroll.scrollTop = 0;
  currentChapter = 0;

  // Update mobile badge
  updateBadge();
}

function closeDocumentary() {
  document.getElementById('doc-viewer').classList.remove('active');
  document.getElementById('home-screen').style.display = 'flex';
  document.getElementById('ep-counter').style.opacity = '0';
  document.getElementById('related-sidebar').classList.remove('visible');
  sidebarVisible = false;
}

document.getElementById('back-btn').addEventListener('click', closeDocumentary);

// ---- Build chapters HTML -------------------------------------
function buildChapters(a) {
  const idx = allAttractions.indexOf(a);
  const scroll = document.getElementById('chapters-scroll');

  scroll.innerHTML = `
    ${buildChapter1(a, idx)}
    ${buildChapter2(a)}
    ${buildChapter3(a)}
    ${buildChapter4(a)}
    ${buildChapter5(a, idx)}
  `;

  // Bind chapter 5 buttons
  bindChapter5Buttons(a, idx);

  // Set up scroll observer
  setupScrollObserver();

  // Set up parallax
  setupParallax();
}

function buildChapter1(a, idx) {
  return `
  <section class="chapter chapter-1" data-chapter="0">
    <div class="ch1-bg-image">
      <img src="${a.image}" alt="${a.name}"
           onerror="this.src='https://picsum.photos/seed/fn${a.id}/1600/900'">
    </div>
    <div class="ch1-content fade-in">
      <div class="chapter-label ch1-ep">${epNum(idx)}</div>
      <h1 class="ch1-title">${a.name}</h1>
      <div class="ch1-meta">${a.state}</div>
      <div class="ch1-region">${a.region} &nbsp;·&nbsp; ${a.category}</div>
    </div>
    <div class="scroll-hint">
      <span>Begin</span>
      <div class="scroll-line"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </section>`;
}

function buildChapter2(a) {
  const terrainTags = a.tags.map(t =>
    `<span class="terrain-tag">${t}</span>`
  ).join('');

  return `
  <section class="chapter chapter-2" data-chapter="1">
    <div class="ch2-layout">
      <div class="ch2-text">
        <div class="chapter-label ch2-chapter-num">Chapter II — The Land</div>
        <h2 class="ch2-heading">The Land &amp; Its Character</h2>
        <p class="ch2-description fade-in">${a.description}</p>
        <div class="terrain-features fade-in">
          <div class="terrain-label">Terrain Features</div>
          <div class="terrain-tags">${terrainTags}</div>
          <div class="terrain-label" style="margin-top:0.85rem">Classification</div>
          <div class="terrain-tags">
            <span class="terrain-tag" style="border-color:rgba(200,169,110,0.6);color:var(--gold)">${a.category}</span>
          </div>
        </div>
      </div>
      <div class="ch2-image-side">
        <img src="${a.image}" alt="${a.name}" class="parallax-img"
             onerror="this.src='https://picsum.photos/seed/fn${a.id}/900/700'"
             style="transform-origin: center center;">
        <div class="ch2-category-badge">${a.category}</div>
      </div>
    </div>
  </section>`;
}

function buildChapter3(a) {
  const obsItems = a.activities.map(act => `
    <div class="field-obs-item">
      <span class="obs-icon">${activityIcon(act)}</span>
      <span class="obs-name">${act}</span>
    </div>
  `).join('');

  return `
  <section class="chapter chapter-3" data-chapter="2">
    <div class="ch3-content">
      <div class="chapter-label ch3-chapter-num">Chapter III — Wildlife &amp; Wonder</div>
      <h2 class="ch3-heading">Field Observations</h2>
      <div class="field-obs-label">Recorded Activities</div>
      <div class="field-observations fade-in">${obsItems}</div>
      <div class="expedition-notes fade-in">
        <div class="exp-note">
          <div class="exp-note-label">Expedition Grade</div>
          <div class="exp-note-value">${a.difficulty}</div>
        </div>
        <div class="exp-note">
          <div class="exp-note-label">Optimal Season</div>
          <div class="exp-note-value">${a.bestTime}</div>
        </div>
      </div>
    </div>
  </section>`;
}

function buildChapter4(a) {
  const accessText = a.accessibility ? 'ADA Accessible' : 'Limited Accessibility';

  return `
  <section class="chapter chapter-4" data-chapter="3">
    <div class="ch4-notebook">
      <div class="ch4-chapter-num">Chapter IV — Practical Notes</div>
      <h2 class="ch4-heading">Correspondent's Notebook</h2>
      <div class="notebook-entries">
        <div class="notebook-entry">
          <div class="nb-key">Entry Fee</div>
          <div class="nb-value handwriting">${a.fee}</div>
        </div>
        <div class="notebook-entry">
          <div class="nb-key">Recommended Duration</div>
          <div class="nb-value handwriting">${a.duration}</div>
        </div>
        <div class="notebook-entry">
          <div class="nb-key">Best Time to Visit</div>
          <div class="nb-value handwriting">${a.bestTime}</div>
        </div>
        <div class="notebook-entry">
          <div class="nb-key">Accessibility</div>
          <div class="nb-value handwriting">${accessText}</div>
        </div>
        <div class="notebook-entry">
          <div class="nb-key">Difficulty Level</div>
          <div class="nb-value handwriting">${a.difficulty}</div>
        </div>
      </div>
    </div>
  </section>`;
}

function buildChapter5(a, idx) {
  const nextIdx = (idx + 1) % allAttractions.length;
  const nextA = allAttractions[nextIdx];
  const isInItin = App.isInItinerary(a.id);
  const isFav = App.isFavorite(a.id);
  const reviewsFormatted = App.formatReviews(a.reviews);
  const stars = starsFull(a.rating);

  return `
  <section class="chapter chapter-5" data-chapter="4">
    <div class="ch5-bg">
      <img src="${a.image}" alt="${a.name}"
           onerror="this.src='https://picsum.photos/seed/fn5x${a.id}/1600/900'">
    </div>
    <div class="ch5-content">
      <div class="chapter-label ch5-chapter-num">Chapter V — Go Now</div>
      <h2 class="ch5-heading">${a.name}</h2>
      <div class="ch5-subheading">Expedition Awaits</div>
      <div class="ch5-rating-wrap">
        <div class="ch5-stars">${stars}</div>
        <div class="ch5-rating-num">${a.rating}</div>
        <div class="ch5-dispatches">
          <strong>${reviewsFormatted}</strong>
          dispatches filed
        </div>
      </div>
      <div class="ch5-actions">
        <button class="btn-expedition ${isInItin ? 'added' : ''}" id="ch5-itin-btn" data-id="${a.id}">
          ${isInItin ? '✓ In Expedition' : '+ Add to Expedition'}
        </button>
        <button class="btn-heart ${isFav ? 'active' : ''}" id="ch5-fav-btn" data-id="${a.id}" title="Save">
          ${isFav ? '♥' : '♡'}
        </button>
        <button class="btn-next-ep" id="ch5-next-btn" data-next="${nextA.id}">
          Next: ${nextA.name.split(' ').slice(0,3).join(' ')} →
        </button>
      </div>
    </div>
  </section>`;
}

function bindChapter5Buttons(a, idx) {
  // Use event delegation on the scroll container
  const scroll = document.getElementById('chapters-scroll');

  scroll.addEventListener('click', function handler(e) {
    // Itinerary button
    if (e.target.closest('#ch5-itin-btn')) {
      const btn = e.target.closest('#ch5-itin-btn');
      const id = parseInt(btn.dataset.id);
      if (App.isInItinerary(id)) {
        App.removeFromItinerary(id);
        btn.textContent = '+ Add to Expedition';
        btn.classList.remove('added');
      } else {
        App.addToItinerary(id);
        btn.textContent = '✓ In Expedition';
        btn.classList.add('added');
      }
      updateItinerarySidebar();
      updateBadge();
    }

    // Fav button
    if (e.target.closest('#ch5-fav-btn')) {
      const btn = e.target.closest('#ch5-fav-btn');
      const id = parseInt(btn.dataset.id);
      const isNow = App.toggleFavorite(id);
      btn.textContent = isNow ? '♥' : '♡';
      btn.classList.toggle('active', isNow);
    }

    // Next episode button
    if (e.target.closest('#ch5-next-btn')) {
      const btn = e.target.closest('#ch5-next-btn');
      const nextId = parseInt(btn.dataset.next);
      const nextAttraction = allAttractions.find(a => a.id === nextId);
      if (nextAttraction) {
        openDocumentary(nextAttraction);
      }
    }
  }, { once: true });
}

// ---- Scroll observer for chapter detection -------------------
function setupScrollObserver() {
  const scroll = document.getElementById('chapters-scroll');
  const chapters = scroll.querySelectorAll('.chapter');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
        const ch = parseInt(entry.target.dataset.chapter);
        if (ch !== currentChapter) {
          currentChapter = ch;
          updateProgressDots(ch);
          applyChapterBackground(ch);

          // Fade in sidebar after chapter 2
          if (ch >= 2 && !sidebarVisible) {
            sidebarVisible = true;
            document.getElementById('related-sidebar').classList.add('visible');
          }

          // Trigger fade-in animations
          entry.target.querySelectorAll('.fade-in').forEach(el => {
            el.classList.add('visible');
          });
        }
      }
    });
  }, {
    root: scroll,
    threshold: 0.5
  });

  chapters.forEach(ch => observer.observe(ch));

  // Also trigger first chapter immediately
  if (chapters.length > 0) {
    chapters[0].querySelectorAll('.fade-in').forEach(el => {
      setTimeout(() => el.classList.add('visible'), 200);
    });
  }
}

function applyChapterBackground(ch) {
  const bgs = ['#0f0f0f', '#1a1208', '#0a1a0a', '#f5e6c8', '#0f0f0f'];
  document.getElementById('doc-viewer').style.background = bgs[ch] || '#0f0f0f';
}

// ---- Progress dots -------------------------------------------
function updateProgressDots(ch) {
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === ch);
  });
}

document.getElementById('progress-dots').addEventListener('click', e => {
  const dot = e.target.closest('.progress-dot');
  if (!dot) return;
  const ch = parseInt(dot.dataset.ch);
  jumpToChapter(ch);
});

function jumpToChapter(ch) {
  const scroll = document.getElementById('chapters-scroll');
  const chapters = scroll.querySelectorAll('.chapter');
  if (chapters[ch]) {
    chapters[ch].scrollIntoView({ behavior: 'smooth' });
  }
}

// ---- Keyboard navigation -------------------------------------
document.addEventListener('keydown', e => {
  if (!document.getElementById('doc-viewer').classList.contains('active')) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    jumpToChapter(Math.min(currentChapter + 1, 4));
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    jumpToChapter(Math.max(currentChapter - 1, 0));
  }
  if (e.key === 'Escape') {
    closeDocumentary();
  }
});

// ---- Parallax for ch2 image ----------------------------------
function setupParallax() {
  const scroll = document.getElementById('chapters-scroll');
  const ch2 = scroll.querySelector('.chapter-2');
  const parallaxImg = scroll.querySelector('.parallax-img');
  if (!ch2 || !parallaxImg) return;

  scroll.addEventListener('scroll', () => {
    const rect = ch2.getBoundingClientRect();
    const viewH = window.innerHeight;
    const progress = (viewH - rect.top) / (viewH + rect.height);
    const offset = (progress - 0.5) * 40;
    parallaxImg.style.transform = `translateY(${offset}px) scale(1.08)`;
  }, { passive: true });
}

// ---- Episode counter -----------------------------------------
function updateEpCounter(a) {
  const idx = allAttractions.indexOf(a);
  document.getElementById('ep-counter').textContent =
    `${epNum(idx)} — ${a.name}`;
}

// ---- Sidebar: related episodes -------------------------------
function updateSidebar(a) {
  const related = allAttractions
    .filter(x => x.region === a.region && x.id !== a.id)
    .slice(0, 4);

  document.getElementById('sidebar-region-label').textContent = a.region;

  const relatedEl = document.getElementById('sidebar-related');
  if (related.length === 0) {
    relatedEl.innerHTML = '<div class="expedition-empty">No nearby episodes</div>';
    return;
  }

  relatedEl.innerHTML = related.map(r => {
    const ridx = allAttractions.indexOf(r);
    const inItin = App.isInItinerary(r.id);
    return `
      <div class="sidebar-ep-card" data-sidebar-watch="${r.id}">
        <img class="sidebar-ep-img" src="${r.image}" alt="${r.name}"
             onerror="this.src='https://picsum.photos/seed/sb${r.id}/120/80'">
        <div class="sidebar-ep-info">
          <div class="sidebar-ep-num">${epNum(ridx)}</div>
          <div class="sidebar-ep-name">${r.name}</div>
        </div>
        <button class="sidebar-add-btn ${inItin ? 'added' : ''}" data-sidebar-add="${r.id}">
          ${inItin ? '✓' : '+'}
        </button>
      </div>`;
  }).join('');
}

// ---- Sidebar: itinerary list ----------------------------------
function updateItinerarySidebar() {
  const itin = App.getItinerary();
  const el = document.getElementById('sidebar-itinerary');

  if (itin.length === 0) {
    el.innerHTML = '<div class="expedition-empty">No stops yet</div>';
    return;
  }

  const items = itin.map(id => {
    const a = allAttractions.find(x => x.id === id);
    if (!a) return '';
    return `
      <div class="expedition-item">
        <span class="expedition-item-name">${a.name}</span>
        <button class="expedition-remove" data-itin-remove="${a.id}" title="Remove">✕</button>
      </div>`;
  }).join('');

  el.innerHTML = items;
}

function updateBadge() {
  const count = App.getItinerary().length;
  const badge = document.getElementById('expedition-badge');
  document.getElementById('badge-count').textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

// ---- Sidebar event delegation --------------------------------
document.getElementById('related-sidebar').addEventListener('click', e => {
  // Watch a related episode
  const watchCard = e.target.closest('[data-sidebar-watch]');
  if (watchCard && !e.target.closest('[data-sidebar-add]')) {
    const id = parseInt(watchCard.dataset.sidebarWatch);
    const a = allAttractions.find(x => x.id === id);
    if (a) openDocumentary(a);
    return;
  }

  // Add to itinerary
  const addBtn = e.target.closest('[data-sidebar-add]');
  if (addBtn) {
    const id = parseInt(addBtn.dataset.sidebarAdd);
    if (App.isInItinerary(id)) {
      App.removeFromItinerary(id);
      addBtn.textContent = '+';
      addBtn.classList.remove('added');
    } else {
      App.addToItinerary(id);
      addBtn.textContent = '✓';
      addBtn.classList.add('added');
    }
    updateItinerarySidebar();
    updateBadge();
    return;
  }

  // Remove from itinerary
  const removeBtn = e.target.closest('[data-itin-remove]');
  if (removeBtn) {
    const id = parseInt(removeBtn.dataset.itinRemove);
    App.removeFromItinerary(id);
    updateItinerarySidebar();
    updateBadge();
    // Sync ch5 button if visible
    const ch5Btn = document.getElementById('ch5-itin-btn');
    if (ch5Btn && parseInt(ch5Btn.dataset.id) === id) {
      ch5Btn.textContent = '+ Add to Expedition';
      ch5Btn.classList.remove('added');
    }
  }
});

// ---- Mobile badge tap ----------------------------------------
document.getElementById('expedition-badge').addEventListener('click', () => {
  // On mobile, flash current itinerary as alert or scroll to top
  const itin = App.getItinerary();
  const names = itin.map(id => {
    const a = allAttractions.find(x => x.id === id);
    return a ? a.name : '';
  }).filter(Boolean);
  if (names.length > 0) {
    alert('My Expedition:\n\n' + names.map((n, i) => `${i+1}. ${n}`).join('\n'));
  }
});

// ---- Initialize ----------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  buildHome();
  updateBadge();
});
</script>
