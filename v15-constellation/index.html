<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Atlas — US Attractions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #020b18;
    --cyan:    #00e5ff;
    --amber:   #ffab40;
    --teal:    #1de9b6;
    --sapphire:#448aff;
    --emerald: #69f0ae;
    --gold:    #ffd740;
    --coral:   #ff6e40;
    --white:   #e8f4fd;
    --panel-bg: rgba(2,11,24,0.95);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--sky);
    font-family: 'Space Mono', monospace;
    color: #ccd;
    user-select: none;
  }

  /* ── MILKY WAY BAND ── */
  #milky-way {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 30% at 50% 55%,
        rgba(100,120,180,0.09) 0%,
        rgba(60,80,140,0.05) 50%,
        transparent 100%);
  }

  /* ── STATIC BACKGROUND STAR FIELD ── */
  #bg-stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── MAIN SKY CANVAS (pan/zoom container) ── */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 2;
    cursor: grab;
  }
  #sky.grabbing { cursor: grabbing; }

  #sky-inner {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ── SVG CONSTELLATION LINES ── */
  #const-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ── STARS (attraction dots) ── */
  .star {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.3s ease;
    z-index: 10;
  }
  .star:hover { transform: translate(-50%, -50%) scale(1.8); z-index: 20; }
  .star.dimmed { opacity: 0.15; }
  .star.bright { transform: translate(-50%, -50%) scale(1.6); opacity: 1 !important; }
  .star.selected { transform: translate(-50%, -50%) scale(2.2); z-index: 25; }
  .star.in-route { z-index: 22; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.75; }
    50% { opacity: 1; }
  }

  /* ── REGION LABELS ── */
  .region-label {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-variant: small-caps;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 15;
    text-transform: uppercase;
    opacity: 0.55;
    transition: opacity 0.3s;
    white-space: nowrap;
    text-shadow: 0 0 8px currentColor;
  }
  .region-label.dimmed { opacity: 0.1; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    z-index: 100;
    background: rgba(2, 11, 30, 0.92);
    border: 1px solid rgba(200,220,255,0.2);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'Orbitron', sans-serif;
    color: #e8f0ff;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 0 12px rgba(100,150,255,0.3);
    opacity: 0;
    transition: opacity 0.15s;
    transform: translate(-50%, -130%);
  }
  #tooltip.show { opacity: 1; }

  /* ── TOP CONTROLS ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(2,11,24,0.95) 0%, rgba(2,11,24,0) 100%);
    pointer-events: none;
  }
  #top-bar > * { pointer-events: all; }

  #app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #e8f4ff;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(100,180,255,0.6);
    flex-shrink: 0;
  }
  #app-title span { color: var(--sapphire); }

  /* ── REGION FILTER DOTS ── */
  #region-filters {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .region-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .region-dot:hover { transform: scale(1.4); }
  .region-dot.active { border-color: white; transform: scale(1.3); }
  .region-dot[title]:hover::after {
    content: attr(title);
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(2,11,24,0.95);
    border: 1px solid rgba(200,220,255,0.2);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-family: 'Orbitron', sans-serif;
    white-space: nowrap;
    color: #e8f0ff;
    pointer-events: none;
    z-index: 200;
  }

  /* ── SEARCH ── */
  #search-wrap {
    position: relative;
    flex-shrink: 0;
  }
  #search {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,220,255,0.2);
    border-radius: 20px;
    padding: 6px 14px 6px 34px;
    color: #e8f0ff;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #search:focus { border-color: var(--sapphire); background: rgba(255,255,255,0.09); }
  #search::placeholder { color: rgba(200,220,255,0.35); }
  #search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
    opacity: 0.5;
  }

  /* ── RESET + ROUTE BUTTONS ── */
  .ctrl-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,220,255,0.25);
    border-radius: 20px;
    color: #e8f0ff;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(200,220,255,0.5); }
  .ctrl-btn.active { background: rgba(255,200,60,0.18); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 12px rgba(255,200,60,0.35); }

  #route-btn { display: none; }
  #route-count-badge {
    display: inline-block;
    background: var(--gold);
    color: #020b18;
    border-radius: 10px;
    padding: 0 6px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ── ITINERARY PANEL (top-right) ── */
  #itin-toggle {
    margin-left: auto;
  }
  #itin-panel {
    position: fixed;
    top: 55px; right: 16px;
    width: 280px;
    background: var(--panel-bg);
    border: 1px solid rgba(200,220,255,0.15);
    border-radius: 12px;
    z-index: 60;
    padding: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #itin-panel.open { display: block; }
  #itin-panel h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .itin-item {
    font-size: 11px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(200,220,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .itin-item span { flex: 1; }
  .itin-remove {
    background: none;
    border: none;
    color: rgba(200,220,255,0.4);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .itin-remove:hover { color: #ff6b6b; }
  #itin-empty { font-size: 11px; opacity: 0.5; font-style: italic; }
  #itin-clear-btn {
    margin-top: 10px;
    width: 100%;
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    color: #ff9999;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px;
    cursor: pointer;
  }
  #itin-clear-btn:hover { background: rgba(255,80,80,0.22); }

  /* ── DETAILS PANEL (bottom sheet) ── */
  #details-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    min-height: 240px;
    background: var(--panel-bg);
    border-top: 1px solid rgba(200,220,255,0.18);
    border-radius: 20px 20px 0 0;
    z-index: 80;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
  }
  #details-panel.open { transform: translateY(0); }

  #panel-handle {
    width: 40px; height: 4px;
    background: rgba(200,220,255,0.25);
    border-radius: 2px;
    margin: 10px auto 0;
    cursor: pointer;
    flex-shrink: 0;
  }

  #panel-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 12px 20px 16px;
    gap: 20px;
  }

  #panel-img-wrap {
    flex-shrink: 0;
    width: 40%;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
  }
  #panel-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #panel-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, var(--panel-bg));
  }

  #panel-info {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(200,220,255,0.2) transparent;
  }
  #panel-info::-webkit-scrollbar { width: 4px; }
  #panel-info::-webkit-scrollbar-track { background: transparent; }
  #panel-info::-webkit-scrollbar-thumb { background: rgba(200,220,255,0.2); border-radius: 2px; }

  #panel-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #e8f4ff;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #panel-state {
    font-size: 11px;
    opacity: 0.6;
    margin-bottom: 8px;
  }
  #panel-rating-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  #panel-stars { color: var(--gold); font-size: 13px; }
  #panel-rating-val { font-size: 12px; font-weight: 700; color: var(--gold); }
  #panel-reviews { font-size: 11px; opacity: 0.5; }

  #panel-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .panel-chip {
    background: rgba(200,220,255,0.08);
    border: 1px solid rgba(200,220,255,0.15);
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 10px;
    color: rgba(200,220,255,0.75);
  }

  #panel-desc {
    font-size: 11px;
    line-height: 1.7;
    opacity: 0.75;
    margin-bottom: 12px;
  }

  #panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .panel-btn {
    border-radius: 20px;
    padding: 7px 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #panel-add-route {
    background: rgba(255,200,60,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }
  #panel-add-route:hover { background: rgba(255,200,60,0.28); box-shadow: 0 0 12px rgba(255,200,60,0.4); }
  #panel-add-route.in-itin {
    background: rgba(100,255,180,0.1);
    border-color: var(--emerald);
    color: var(--emerald);
  }
  #panel-fav {
    background: rgba(255,80,120,0.12);
    border-color: rgba(255,100,150,0.5);
    color: #ff6b9d;
  }
  #panel-fav:hover { background: rgba(255,80,120,0.22); }
  #panel-fav.is-fav { background: rgba(255,80,120,0.25); border-color: #ff6b9d; }

  #panel-close {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: none;
    color: rgba(200,220,255,0.4);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    z-index: 5;
    transition: color 0.2s;
  }
  #panel-close:hover { color: #e8f0ff; }

  /* ── SHOOTING STAR ── */
  .shooting-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: shoot 1.2s linear forwards;
  }
  @keyframes shoot {
    0% { opacity: 1; transform: translate(0, 0) scaleX(1); }
    100% { opacity: 0; transform: translate(600px, 350px) scaleX(80); }
  }

  /* ── ROUTE SVG ── */
  #route-svg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 30;
    overflow: visible;
  }

  /* ── ZOOM HINT ── */
  #zoom-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 10px;
    font-family: 'Orbitron', sans-serif;
    color: rgba(200,220,255,0.3);
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 50;
  }

  /* ── SCROLLBAR GLOBAL ── */
  * { scrollbar-width: thin; scrollbar-color: rgba(200,220,255,0.15) transparent; }

  /* ── STAR COLORS per region (box-shadow applied in JS) ── */
</style>
</head>
<body>

<div id="milky-way"></div>
<canvas id="bg-stars"></canvas>

<!-- Route SVG (screen-space, not affected by pan/zoom) -->
<svg id="route-svg"></svg>

<!-- SKY: pan + zoom container -->
<div id="sky">
  <div id="sky-inner">
    <svg id="const-svg"></svg>
    <!-- stars and labels injected here by JS -->
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- TOP BAR -->
<div id="top-bar">
  <div id="app-title">Constellation <span>Atlas</span></div>
  <div id="region-filters"></div>
  <div id="search-wrap">
    <span id="search-icon">✦</span>
    <input type="text" id="search" placeholder="Search stars...">
  </div>
  <button class="ctrl-btn" id="reset-btn">Reset View</button>
  <button class="ctrl-btn" id="route-btn">
    ✦ Draw Route <span id="route-count-badge">0</span>
  </button>
  <button class="ctrl-btn" id="itin-toggle">Itinerary</button>
</div>

<!-- ITINERARY SIDE PANEL -->
<div id="itin-panel">
  <h3>My Route</h3>
  <div id="itin-list"></div>
  <div id="itin-empty">No stops added yet.</div>
  <button id="itin-clear-btn">Clear All</button>
</div>

<!-- DETAILS BOTTOM SHEET -->
<div id="details-panel">
  <div id="panel-handle"></div>
  <button id="panel-close">×</button>
  <div id="panel-body">
    <div id="panel-img-wrap">
      <img id="panel-img" src="" alt="">
      <div id="panel-img-overlay"></div>
    </div>
    <div id="panel-info">
      <div id="panel-name"></div>
      <div id="panel-state"></div>
      <div id="panel-rating-row">
        <span id="panel-stars"></span>
        <span id="panel-rating-val"></span>
        <span id="panel-reviews"></span>
      </div>
      <div id="panel-chips"></div>
      <div id="panel-desc"></div>
      <div id="panel-actions">
        <button class="panel-btn" id="panel-add-route">+ Add to Route</button>
        <button class="panel-btn" id="panel-fav">♡ Favorite</button>
      </div>
    </div>
  </div>
</div>

<div id="zoom-hint">scroll / pinch to zoom · drag to pan</div>

<script src="../shared/data.js"></script>
<script src="../shared/app.js"></script>
<script>
// ============================================================
//  CONSTELLATION ATLAS — main app
// ============================================================

const REGION_COLORS = {
  'Rocky Mountains': '#00e5ff',
  'Southwest':       '#ffab40',
  'Pacific West':    '#1de9b6',
  'Northeast':       '#448aff',
  'Southeast':       '#69f0ae',
  'Great Plains':    '#ffd740',
  'Hawaii':          '#ff6e40',
  'Alaska':          '#e8f4fd',
};

// Geographic-ish zones: {cx, cy, rx, ry} as 0–1 fractions of screen
// Layout: NW=Pacific West, N-mid=Rocky Mtn, NE=Northeast
//         W=Alaska, SW zone, mid=Great Plains, SE=Southeast
//         bottom-left=Hawaii (island chain feel), bottom-right anchors
const REGION_ZONES = {
  'Pacific West':    { cx: 0.10, cy: 0.38, rx: 0.12, ry: 0.25 },
  'Alaska':          { cx: 0.08, cy: 0.14, rx: 0.07, ry: 0.09 },
  'Rocky Mountains': { cx: 0.30, cy: 0.30, rx: 0.11, ry: 0.22 },
  'Southwest':       { cx: 0.26, cy: 0.62, rx: 0.13, ry: 0.22 },
  'Great Plains':    { cx: 0.52, cy: 0.42, rx: 0.10, ry: 0.22 },
  'Northeast':       { cx: 0.74, cy: 0.22, rx: 0.12, ry: 0.18 },
  'Southeast':       { cx: 0.70, cy: 0.62, rx: 0.12, ry: 0.20 },
  'Hawaii':          { cx: 0.18, cy: 0.86, rx: 0.10, ry: 0.07 },
};

// ── Background star field ──────────────────────────────────
function drawBgStars() {
  const canvas = document.getElementById('bg-stars');
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const seed = 42;
  // Simple seeded rand
  let s = seed;
  function rand() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  }
  for (let i = 0; i < 400; i++) {
    const x = rand() * W;
    const y = rand() * H;
    const r = rand() * 1.1 + 0.3;
    const a = rand() * 0.5 + 0.1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${a})`;
    ctx.fill();
  }
}

// ── Seeded position within zone ───────────────────────────
function starPosition(attraction, idx) {
  const zone = REGION_ZONES[attraction.region];
  const W = window.innerWidth, H = window.innerHeight;
  // Deterministic scatter using id
  const t1 = ((attraction.id * 137.508) % 100) / 100;
  const t2 = ((attraction.id * 97.321 + idx * 53.1) % 100) / 100;
  // Map to ellipse zone with some scatter (use golden angle for nice spread)
  const angle = t1 * Math.PI * 2;
  const dist = Math.sqrt(t2); // uniform in ellipse
  const x = (zone.cx + Math.cos(angle) * dist * zone.rx) * W;
  const y = (zone.cy + Math.sin(angle) * dist * zone.ry) * H;
  return { x, y };
}

// ── Star size from rating ──────────────────────────────────
function starSize(rating) {
  const t = (rating - 4.4) / (4.9 - 4.4);
  return 8 + t * (22 - 8);
}

// ── Glow intensity from reviews ───────────────────────────
function glowFromReviews(reviews) {
  const norm = Math.min(reviews / 85000, 1);
  return 4 + norm * 22; // px spread
}

// ── Rating stars HTML ──────────────────────────────────────
function starsHTML(r) {
  const full = Math.round(r);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

// ── Format reviews ────────────────────────────────────────
function fmtReviews(n) {
  return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
}

// ── Build star elements ───────────────────────────────────
let starElements = {}; // id -> DOM el
let starPositions = {}; // id -> {x, y}
let regionGroups = {}; // region -> [ids]

function buildStars() {
  const skyInner = document.getElementById('sky-inner');
  // Remove existing stars
  document.querySelectorAll('.star, .region-label').forEach(e => e.remove());
  starElements = {};
  starPositions = {};
  regionGroups = {};

  // Sort by region so we can track index within region
  const regionIdx = {};
  attractions.forEach(a => {
    if (!regionIdx[a.region]) regionIdx[a.region] = 0;
    const idx = regionIdx[a.region]++;
    const pos = starPosition(a, idx);
    starPositions[a.id] = pos;
    if (!regionGroups[a.region]) regionGroups[a.region] = [];
    regionGroups[a.region].push(a.id);

    const size = starSize(a.rating);
    const color = REGION_COLORS[a.region] || '#ffffff';
    const glow = glowFromReviews(a.reviews);
    const twinkleDur = 2 + ((a.id * 73) % 30) / 10; // 2–5s

    const el = document.createElement('div');
    el.className = 'star';
    el.dataset.id = a.id;
    el.dataset.region = a.region;
    el.style.cssText = `
      left: ${pos.x}px;
      top: ${pos.y}px;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${glow}px ${glow * 0.6}px ${color},
                  0 0 ${glow * 2}px ${glow}px ${color}44,
                  0 0 ${size * 0.5}px ${color}88;
      animation: twinkle ${twinkleDur}s ease-in-out infinite;
      animation-delay: ${((a.id * 37) % 50) / 10}s;
    `;

    el.addEventListener('mouseenter', onStarHover);
    el.addEventListener('mouseleave', onStarLeave);
    el.addEventListener('click', onStarClick);

    skyInner.appendChild(el);
    starElements[a.id] = el;
  });

  // Region labels — placed at zone center
  const W = window.innerWidth, H = window.innerHeight;
  Object.entries(REGION_ZONES).forEach(([region, zone]) => {
    const color = REGION_COLORS[region] || '#ffffff';
    const lbl = document.createElement('div');
    lbl.className = 'region-label';
    lbl.dataset.region = region;
    lbl.textContent = region;
    lbl.style.cssText = `
      left: ${zone.cx * W}px;
      top: ${(zone.cy - zone.ry * 1.1) * H - 16}px;
      color: ${color};
      transform: translateX(-50%);
    `;
    skyInner.appendChild(lbl);
  });
}

// ── Constellation lines (SVG) ─────────────────────────────
function buildConstellationLines() {
  const svg = document.getElementById('const-svg');
  svg.innerHTML = '';
  const W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  Object.entries(regionGroups).forEach(([region, ids]) => {
    const color = REGION_COLORS[region] || '#ffffff';
    const pts = ids.map(id => starPositions[id]);
    // Connect neighbors in sequence (sort by x to get left-right flow)
    const sorted = [...pts].map((p, i) => ({ p, id: ids[i] }))
      .sort((a, b) => a.p.x - b.p.x);

    // Build a simple nearest-neighbor chain for constellation look
    const connected = new Set();
    const chain = [sorted[0]];
    connected.add(sorted[0].id);

    while (chain.length < sorted.length) {
      const cur = chain[chain.length - 1].p;
      let best = null, bestDist = Infinity;
      sorted.forEach(item => {
        if (connected.has(item.id)) return;
        const dx = item.p.x - cur.x, dy = item.p.y - cur.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < bestDist) { bestDist = d; best = item; }
      });
      if (best) { chain.push(best); connected.add(best.id); }
      else break;
    }

    // Draw lines along chain
    for (let i = 0; i < chain.length - 1; i++) {
      const a = chain[i].p, b = chain[i + 1].p;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
      line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
      line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', '0.8');
      line.setAttribute('stroke-opacity', '0.22');
      line.setAttribute('stroke-dasharray', '4 7');
      line.setAttribute('class', `const-line region-${CSS.escape(region)}`);
      line.dataset.region = region;
      svg.appendChild(line);
    }
  });
}

// ── Shooting star ──────────────────────────────────────────
function launchShootingStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  const W = window.innerWidth, H = window.innerHeight;
  el.style.left = (Math.random() * W * 0.6) + 'px';
  el.style.top = (Math.random() * H * 0.3) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}
setInterval(launchShootingStar, 8000);
setTimeout(launchShootingStar, 1000); // first one soon

// ── Pan & Zoom ─────────────────────────────────────────────
let panX = 0, panY = 0, scale = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, dragStartPanX = 0, dragStartPanY = 0;
let pinchDist0 = null, pinchScale0 = 1;

function applySkyTransform() {
  document.getElementById('sky-inner').style.transform =
    `translate(${panX}px, ${panY}px) scale(${scale})`;
  if (routeIds && routeIds.length >= 2) drawRouteSVG();
}

const sky = document.getElementById('sky');

sky.addEventListener('mousedown', e => {
  if (e.target.classList.contains('star')) return;
  dragging = true;
  sky.classList.add('grabbing');
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragStartPanX = panX; dragStartPanY = panY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = dragStartPanX + (e.clientX - dragStartX);
  panY = dragStartPanY + (e.clientY - dragStartY);
  applySkyTransform();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  sky.classList.remove('grabbing');
});

sky.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newScale = Math.min(Math.max(scale * factor, 0.3), 5);
  // Zoom around mouse position
  const rect = sky.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applySkyTransform();
}, { passive: false });

// Touch pinch
sky.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx * dx + dy * dy);
    pinchScale0 = scale;
  } else if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragStartPanX = panX; dragStartPanY = panY;
  }
}, { passive: true });

sky.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchDist0 !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    scale = Math.min(Math.max(pinchScale0 * dist / pinchDist0, 0.3), 5);
    applySkyTransform();
  } else if (e.touches.length === 1 && dragging) {
    panX = dragStartPanX + (e.touches[0].clientX - dragStartX);
    panY = dragStartPanY + (e.touches[0].clientY - dragStartY);
    applySkyTransform();
  }
}, { passive: false });

sky.addEventListener('touchend', () => {
  dragging = false;
  pinchDist0 = null;
});

document.getElementById('reset-btn').addEventListener('click', () => {
  panX = 0; panY = 0; scale = 1;
  applySkyTransform();
});

// ── Tooltip ────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let tooltipTarget = null;

function onStarHover(e) {
  const id = +e.currentTarget.dataset.id;
  const a = attractionById(id);
  if (!a) return;
  tooltipTarget = e.currentTarget;
  tooltip.textContent = a.name;
  positionTooltip(e);
  tooltip.classList.add('show');
}
function onStarLeave() {
  tooltip.classList.remove('show');
  tooltipTarget = null;
}
function positionTooltip(e) {
  tooltip.style.left = e.clientX + 'px';
  tooltip.style.top = e.clientY + 'px';
}
window.addEventListener('mousemove', e => {
  if (tooltipTarget) positionTooltip(e);
});

// ── Attraction lookup ──────────────────────────────────────
const attractionMap = {};
function buildAttractionMap() {
  attractions.forEach(a => { attractionMap[a.id] = a; });
}
function attractionById(id) { return attractionMap[id]; }

// ── Details panel ──────────────────────────────────────────
let currentAttractionId = null;
const panel = document.getElementById('details-panel');

function openPanel(a) {
  currentAttractionId = a.id;
  document.getElementById('panel-name').textContent = a.name;
  document.getElementById('panel-state').textContent = '✦ ' + a.state + ' · ' + a.region;
  document.getElementById('panel-stars').textContent = starsHTML(a.rating);
  document.getElementById('panel-rating-val').textContent = a.rating;
  document.getElementById('panel-reviews').textContent = '(' + fmtReviews(a.reviews) + ' reviews)';

  const chips = document.getElementById('panel-chips');
  chips.innerHTML = [
    `<span class="panel-chip">💰 ${a.fee}</span>`,
    `<span class="panel-chip">📅 ${a.bestTime}</span>`,
    `<span class="panel-chip">⏱ ${a.duration}</span>`,
    a.accessibility ? `<span class="panel-chip">♿ Accessible</span>` : '',
  ].join('');

  document.getElementById('panel-desc').textContent = a.description;

  const img = document.getElementById('panel-img');
  img.src = `../shared/images/${a.slug}.jpg`;
  img.alt = a.name;
  img.onerror = function() {
    this.src = `https://picsum.photos/seed/${a.slug}/600/400`;
  };

  updatePanelButtons();
  panel.classList.add('open');
}

function updatePanelButtons() {
  if (!currentAttractionId) return;
  const inItin = App.isInItinerary(currentAttractionId);
  const btnR = document.getElementById('panel-add-route');
  btnR.textContent = inItin ? '✓ In Itinerary' : '+ Add to Route';
  btnR.classList.toggle('in-itin', inItin);

  const isFav = App.isFavorite(currentAttractionId);
  const btnF = document.getElementById('panel-fav');
  btnF.textContent = isFav ? '♥ Favorited' : '♡ Favorite';
  btnF.classList.toggle('is-fav', isFav);
}

function closePanel() {
  panel.classList.remove('open');
  if (currentAttractionId && starElements[currentAttractionId]) {
    starElements[currentAttractionId].classList.remove('selected');
  }
  currentAttractionId = null;
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('panel-handle').addEventListener('click', closePanel);

// Swipe-down to close
let touchStartY = 0;
panel.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
panel.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 60) closePanel();
}, { passive: true });

document.getElementById('panel-add-route').addEventListener('click', () => {
  if (!currentAttractionId) return;
  if (!App.isInItinerary(currentAttractionId)) {
    App.addToItinerary(currentAttractionId);
  } else {
    App.removeFromItinerary(currentAttractionId);
  }
  updatePanelButtons();
  renderItinerary();
  updateRouteBtn();
});

document.getElementById('panel-fav').addEventListener('click', () => {
  if (!currentAttractionId) return;
  App.toggleFavorite(currentAttractionId);
  updatePanelButtons();
});

// ── Route mode ────────────────────────────────────────────
let clickCount = 0; // track clicks to unlock route btn
let routeMode = false;
let routeIds = []; // ordered list of ids in current drawn route

document.getElementById('route-btn').addEventListener('click', () => {
  routeMode = !routeMode;
  document.getElementById('route-btn').classList.toggle('active', routeMode);
  if (!routeMode) {
    routeIds = [];
    drawRouteSVG();
  }
});

function updateRouteBtn() {
  const count = App.getItinerary().length;
  document.getElementById('route-count-badge').textContent = count;
  if (count >= 2) {
    document.getElementById('route-btn').style.display = 'inline-block';
  }
}

// ── Star click ────────────────────────────────────────────
function onStarClick(e) {
  e.stopPropagation();
  const id = +e.currentTarget.dataset.id;
  const a = attractionById(id);
  if (!a) return;

  clickCount++;

  // Select visual
  Object.values(starElements).forEach(el => el.classList.remove('selected'));
  e.currentTarget.classList.add('selected');

  if (routeMode) {
    // In route mode: add to route path
    if (!routeIds.includes(id)) routeIds.push(id);
    else routeIds = routeIds.filter(i => i !== id); // toggle off
    drawRouteSVG();
    e.currentTarget.classList.toggle('in-route', routeIds.includes(id));
  }

  openPanel(a);

  if (clickCount >= 2) {
    updateRouteBtn();
  }
}

// ── Draw route overlay (screen-space) ─────────────────────
function starScreenPos(id) {
  const pos = starPositions[id]; // position in sky-inner coords
  // Transform through pan/zoom
  const x = pos.x * scale + panX;
  const y = pos.y * scale + panY;
  return { x, y };
}

function drawRouteSVG() {
  const svg = document.getElementById('route-svg');
  svg.innerHTML = '';
  if (routeIds.length < 2) return;
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const glowFilter = `
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  defs.innerHTML = glowFilter;
  svg.appendChild(defs);
  for (let i = 0; i < routeIds.length - 1; i++) {
    const a = starScreenPos(routeIds[i]);
    const b = starScreenPos(routeIds[i + 1]);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('stroke', '#ffd740');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-opacity', '0.85');
    line.setAttribute('filter', 'url(#glow)');
    svg.appendChild(line);
  }
}

// ── Region filter dots ────────────────────────────────────
const activeRegionFilters = new Set();

function buildRegionFilters() {
  const container = document.getElementById('region-filters');
  container.innerHTML = '';
  Object.entries(REGION_COLORS).forEach(([region, color]) => {
    const dot = document.createElement('div');
    dot.className = 'region-dot active';
    dot.title = region;
    dot.dataset.region = region;
    dot.style.background = color;
    dot.style.boxShadow = `0 0 8px 2px ${color}88`;
    dot.addEventListener('click', () => toggleRegionFilter(region));
    container.appendChild(dot);
    activeRegionFilters.add(region);
  });
}

function toggleRegionFilter(region) {
  const dot = document.querySelector(`.region-dot[data-region="${region}"]`);
  if (activeRegionFilters.has(region)) {
    activeRegionFilters.delete(region);
    dot.classList.remove('active');
    dot.style.boxShadow = 'none';
    dot.style.opacity = '0.35';
  } else {
    activeRegionFilters.add(region);
    const color = REGION_COLORS[region];
    dot.classList.add('active');
    dot.style.boxShadow = `0 0 8px 2px ${color}88`;
    dot.style.opacity = '1';
  }
  applyFilters();
}

// ── Search filter ─────────────────────────────────────────
let searchQuery = '';
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  applyFilters();
});

function applyFilters() {
  const svg = document.getElementById('const-svg');
  const hasSearch = searchQuery.length > 0;

  attractions.forEach(a => {
    const el = starElements[a.id];
    if (!el) return;
    const regionActive = activeRegionFilters.has(a.region);
    const matchesSearch = !hasSearch || (
      a.name.toLowerCase().includes(searchQuery) ||
      a.state.toLowerCase().includes(searchQuery) ||
      a.tags.join(' ').toLowerCase().includes(searchQuery) ||
      a.region.toLowerCase().includes(searchQuery)
    );
    const visible = regionActive && (!hasSearch || matchesSearch);
    el.classList.toggle('dimmed', !visible);
    el.classList.toggle('bright', hasSearch && matchesSearch && regionActive);
    if (!hasSearch) el.classList.remove('bright');
  });

  // Dim constellation lines for inactive regions
  svg.querySelectorAll('.const-line').forEach(line => {
    const region = line.dataset.region;
    line.setAttribute('stroke-opacity', activeRegionFilters.has(region) ? '0.22' : '0.04');
  });

  // Dim region labels
  document.querySelectorAll('.region-label').forEach(lbl => {
    lbl.classList.toggle('dimmed', !activeRegionFilters.has(lbl.dataset.region));
  });
}

// ── Itinerary panel ───────────────────────────────────────
function renderItinerary() {
  const itin = App.getItinerary();
  const list = document.getElementById('itin-list');
  const empty = document.getElementById('itin-empty');
  list.innerHTML = '';
  if (itin.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  itin.forEach(id => {
    const a = attractionById(id);
    if (!a) return;
    const row = document.createElement('div');
    row.className = 'itin-item';
    const color = REGION_COLORS[a.region] || '#fff';
    row.innerHTML = `
      <span style="color:${color}; font-size:8px;">✦</span>
      <span>${a.name}</span>
      <button class="itin-remove" data-id="${a.id}" title="Remove">×</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.itin-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      App.removeFromItinerary(+btn.dataset.id);
      renderItinerary();
      updateRouteBtn();
      if (currentAttractionId) updatePanelButtons();
    });
  });
}

document.getElementById('itin-toggle').addEventListener('click', () => {
  const p = document.getElementById('itin-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderItinerary();
});

document.getElementById('itin-clear-btn').addEventListener('click', () => {
  App.clearItinerary();
  routeIds = [];
  drawRouteSVG();
  renderItinerary();
  updateRouteBtn();
  document.getElementById('route-btn').style.display = 'none';
  routeMode = false;
  document.getElementById('route-btn').classList.remove('active');
  if (currentAttractionId) updatePanelButtons();
  document.querySelectorAll('.star.in-route').forEach(el => el.classList.remove('in-route'));
});

// Click outside itinerary panel to close
document.addEventListener('click', e => {
  const panel = document.getElementById('itin-panel');
  const toggle = document.getElementById('itin-toggle');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== toggle) {
    panel.classList.remove('open');
  }
});

// ── Init ──────────────────────────────────────────────────
function init() {
  buildAttractionMap();
  drawBgStars();
  buildStars();
  buildConstellationLines();
  buildRegionFilters();
  updateRouteBtn();
}

window.addEventListener('resize', () => {
  drawBgStars();
  buildStars();
  buildConstellationLines();
  if (routeIds.length >= 2) drawRouteSVG();
});

init();
</script>
